[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     info
    Parsers_File  /fluent-bit/etc/parsers.conf
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020

# 來源 1：所有 Docker 容器的 stdout / stderr（透過 docker json-file driver）
[INPUT]
    Name              tail
    Tag               docker.*
    Path              /var/lib/docker/containers/*/*.log
    Parser            docker
    Refresh_Interval  5
    Mem_Buf_Limit     50MB
    Skip_Long_Lines   On
    Read_from_Head    False

# 過濾：把 docker container metadata 加進 log 紀錄
[FILTER]
    Name           parser
    Match          docker.*
    Key_Name       log
    Parser         docker_json
    Reserve_Data   On

# 過濾：補上容器名稱 / image label
[FILTER]
    Name           record_modifier
    Match          docker.*
    Record         _stream  fluent-bit

# 輸出：推到 VictoriaLogs（jsonline 介面）
# VictoriaLogs 預設接受 ndjson 格式；每行一個 JSON 物件
[OUTPUT]
    Name              http
    Match             *
    Host              victoria-logs
    Port              9428
    URI               /insert/jsonline?_stream_fields=_stream,container_name&_msg_field=log&_time_field=time
    Format            json_lines
    Json_Date_Key     time
    Json_Date_Format  iso8601
    Header            Content-Type application/stream+json
    Compress          gzip
    Retry_Limit       3
