[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     info
    Parsers_File  /fluent-bit/etc/parsers.conf
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020

# 來源 1：所有 Docker 容器的 stdout / stderr（透過 docker json-file driver）
# Path_Key 把實際讀到的 log 檔路徑塞進 record，給 enrich.lua 解 container id 用。
#
# Read_from_Head + DB：
#   * Read_from_Head True  → 第一次看到一個 log 檔時,從頭讀(撈到啟動 banner)
#   * DB                   → 把每個檔的讀取位置寫進 sqlite,下次 fluent-bit
#                            重啟時從上次斷點繼續,不重讀也不漏讀
#   * 副作用:第一次切到 True 時,既有檔案會從頭再讀一遍 → VL 會有一批
#     近期 log 重複(一次性)。之後就 idempotent。
[INPUT]
    Name              tail
    Tag               docker.*
    Path              /var/lib/docker/containers/*/*.log
    Path_Key          file_path
    Parser            docker
    Refresh_Interval  5
    Mem_Buf_Limit     50MB
    Skip_Long_Lines   On
    Read_from_Head    True
    DB                /fluent-bit/state/positions.db
    DB.Sync           Normal

# 過濾：把 docker container metadata 加進 log 紀錄
[FILTER]
    Name           parser
    Match          docker.*
    Key_Name       log
    Parser         docker_json
    Reserve_Data   On

# 過濾：從 Path_Key 解出 container_id / container_name，送進 VictoriaLogs 後
# 才能用 container_name 做 stream field 過濾（不然全部 log 會擠在同一個 stream）。
[FILTER]
    Name           lua
    Match          docker.*
    Script         /fluent-bit/etc/enrich.lua
    Call           add_container_meta

# 過濾：補上固定 stream 標記
[FILTER]
    Name           record_modifier
    Match          docker.*
    Record         _stream  fluent-bit

# 輸出：推到 VictoriaLogs（jsonline 介面）
# VictoriaLogs 預設接受 ndjson 格式；每行一個 JSON 物件
[OUTPUT]
    Name              http
    Match             *
    Host              victoria-logs
    Port              9428
    URI               /insert/jsonline?_stream_fields=_stream,container_name&_msg_field=log&_time_field=time
    Format            json_lines
    Json_Date_Key     time
    Json_Date_Format  iso8601
    Header            Content-Type application/stream+json
    Compress          gzip
    Retry_Limit       3
