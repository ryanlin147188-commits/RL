# Docker json-file driver 產生的 log 是 JSON Lines 格式：
# {"log":"...","stream":"stdout","time":"2024-01-01T00:00:00.000000Z"}
[PARSER]
    Name        docker
    Format      json
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%L
    Time_Keep   On

# 容器內若 log 本體又是 JSON，再 parse 一次（可選）
[PARSER]
    Name        docker_json
    Format      json
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%L
    Time_Keep   On
