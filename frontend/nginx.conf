# Map at http-level (this file is included inside the parent's http{}).
# `Connection: upgrade` only when there is one — otherwise close — so the
# /recorder/* proxy can serve both regular HTTP GETs and WebSocket upgrades
# from the same `proxy_set_header Connection $connection_upgrade` line.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ── Docker 內建 DNS（127.0.0.11）；搭配下方 proxy_pass 用變數的寫法，
    #     強迫 nginx 每次請求重新解析上游 IP，避免 backend 容器重建後 nginx
    #     仍指向舊 IP 造成 502 Bad Gateway。
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── SPA fallback ─────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html itself must NOT be cached -- otherwise users keep seeing
    # stale JS after a deploy. The mounted file changes on every push;
    # static assets under /js/ etc. can still be cached normally below.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    # ── REST API 反代到 backend:8000 ─────────────────────
    location /api/ {
        set                $backend_upstream http://backend:8000;
        proxy_pass         $backend_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── SeaweedFS S3 反代:截圖(pic bucket)───────────────
    # 任何 /pics/* 請求一律走 SeaweedFS,不再經過 backend(已不再保留 PIC_FOLDER 本地檔案)。
    # 包含 step screenshots、defect attachments、recording trace.zip。
    location /pics/ {
        rewrite ^/pics/(.*)$ /pic/$1 break;
        proxy_pass         http://seaweedfs:8333;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_buffering    off;

        # 一律隱藏 upstream 的 Access-Control-* 由 nginx 端統一輸出
        proxy_hide_header  Access-Control-Allow-Origin;
        proxy_hide_header  Access-Control-Allow-Credentials;
        proxy_hide_header  Access-Control-Allow-Methods;
        proxy_hide_header  Access-Control-Allow-Headers;
        proxy_hide_header  Access-Control-Expose-Headers;
        proxy_hide_header  Access-Control-Max-Age;

        # CORS:允許跨來源讀檔(trace.playwright.dev 等)
        add_header Access-Control-Allow-Origin  '*' always;
        add_header Access-Control-Allow-Methods 'GET, HEAD, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Range, If-Range, Content-Type' always;
        add_header Access-Control-Expose-Headers 'Content-Length, Content-Range, Accept-Ranges' always;
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  '*' always;
            add_header Access-Control-Allow-Methods 'GET, HEAD, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Range, If-Range, Content-Type' always;
            add_header Access-Control-Max-Age       1728000;
            return 204;
        }
    }

    # ── SeaweedFS S3 反代:報表(results bucket)───────────
    # 包含 log.html / report.html / output.xml / Robot listener 上傳的 step screenshots
    # 與 trace.playwright.dev 嵌入式 viewer 會跨網域 fetch trace.zip,必須開 CORS。
    location /results/ {
        proxy_pass         http://seaweedfs:8333/results/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_buffering    off;

        # 一律隱藏 upstream 的 Access-Control-* 由 nginx 端統一輸出
        proxy_hide_header  Access-Control-Allow-Origin;
        proxy_hide_header  Access-Control-Allow-Credentials;
        proxy_hide_header  Access-Control-Allow-Methods;
        proxy_hide_header  Access-Control-Allow-Headers;
        proxy_hide_header  Access-Control-Expose-Headers;
        proxy_hide_header  Access-Control-Max-Age;

        # CORS:允許 trace.playwright.dev 與本機網域跨來源讀檔
        add_header Access-Control-Allow-Origin  '*' always;
        add_header Access-Control-Allow-Methods 'GET, HEAD, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Range, If-Range, Content-Type' always;
        add_header Access-Control-Expose-Headers 'Content-Length, Content-Range, Accept-Ranges' always;
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  '*' always;
            add_header Access-Control-Allow-Methods 'GET, HEAD, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Range, If-Range, Content-Type' always;
            add_header Access-Control-Max-Age       1728000;
            return 204;
        }
    }

    # ── 容器錄製 noVNC 反代 ──────────────────────────────
    # 把 /recorder/<short_id>/<rest> 反代到容器名為
    # `autotest-recorder-<short_id>` 的 recorder 容器的 6080 port。
    # 之所以走 same-origin 反代而不直接讓瀏覽器連 host published port:
    #   * Chrome 的 HTTPS-First Mode 會把 http://localhost:<random> 升級成
    #     https://,recorder 沒 TLS → ERR_EMPTY_RESPONSE。同 host:80
    #     就不會被升級。
    #   * Edge / 各家瀏覽器的 cross-host loopback / PNA preflight 也會
    #     觸發各種詭異行為,走同源完全避開。
    # 短 id 是 session UUID 的前 8 字元(對應 backend container_name)。
    # WebSocket 升級給 /websockify 用。
    location ~ ^/recorder/(?<rec_sess>[A-Za-z0-9]+)/(?<rec_path>.*)$ {
        set                 $rec_upstream http://autotest-recorder-$rec_sess:6080;
        proxy_pass          $rec_upstream/$rec_path$is_args$args;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection $connection_upgrade;
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        # 長閒置 WebSocket(一場錄製可能十幾分鐘什麼都沒按)
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        # VNC frame 立即 flush,不要 buffer
        proxy_buffering     off;
        # recorder 容器可能還沒起來(race),回 502 比 timeout 友善
        proxy_connect_timeout 5s;
    }

    # ── WebSocket 升級反代 ───────────────────────────────
    location /ws/ {
        set                 $backend_upstream http://backend:8000;
        proxy_pass          $backend_upstream$request_uri;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host $host;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # ── gzip ─────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss text/javascript;
    gzip_min_length 1024;
}
