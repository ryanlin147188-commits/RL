# Map at http-level (this file is included inside the parent's http{}).
# `Connection: upgrade` only when there is one — otherwise close — so the
# /recorder/* proxy can serve both regular HTTP GETs and WebSocket upgrades
# from the same `proxy_set_header Connection $connection_upgrade` line.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen       80;
    # HTTPS:Playwright Trace Viewer 跑 SharedArrayBuffer 必須 secure context;
    # 純 HTTP LAN 不算,所以開個 443 跑自簽 cert(image 內 build-time 產),
    # 使用者第一次連 https 接受警告即可。
    listen       443 ssl;
    server_name  _;
    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root   /usr/share/nginx/html;
    index  index.html;

    # ── 上傳大小:預設 1M 太小,使用者上傳 avatar / trace.zip / .md 等
    #     大檔常撞 413 Request Entity Too Large。放寬到 20M。
    client_max_body_size 20M;

    # ── Docker 內建 DNS（127.0.0.11）；搭配下方 proxy_pass 用變數的寫法，
    #     強迫 nginx 每次請求重新解析上游 IP，避免 backend 容器重建後 nginx
    #     仍指向舊 IP 造成 502 Bad Gateway。
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── SPA fallback ─────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── 自托管 Playwright Trace Viewer ──────────────────
    # 需要 cross-origin isolation 才能用 SharedArrayBuffer 解碼 trace.zip;
    # 缺 COOP/COEP 的話 JS 跑起來但畫面一片白。同時要回 CORP 避免 viewer 內
    # 從 /results/ fetch trace.zip 被擋。
    location /trace-viewer/ {
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        # webmanifest 要回正確 content-type,瀏覽器才不會把它當 octet-stream
        # 然後在 console 噴 "Manifest: Syntax error"。
        location ~ \.webmanifest$ {
            default_type application/manifest+json;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
            try_files $uri =404;
        }
        try_files $uri $uri/ /trace-viewer/index.html;
    }

    # ── 自簽憑證下載 ──────────────────────────────────────
    # Trace Viewer 用 Service Worker 攔截 trace.zip 內的 snapshot URL,SW 對 cert
    # 有硬性要求(自簽接受警告也不夠),要把 cert 加進 OS 信任 store 才能跑。
    # 走 HTTP(80)就能下載,不能先 HTTPS 因為使用者就是因為 cert 未信任才需要這個。
    location = /install-cert/server.crt {
        alias /etc/nginx/certs/server.crt;
        default_type application/x-x509-ca-cert;
        add_header Content-Disposition 'attachment; filename="autotest-platform.crt"' always;
    }

    # index.html itself must NOT be cached -- otherwise users keep seeing
    # stale JS after a deploy. The mounted file changes on every push;
    # static assets under /js/ etc. can still be cached normally below.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    # Perf A3:靜態 JS modules 採短期 cache(現階段 1h)。bind-mount 改檔不會
    # 讓既有 client cache 失效,所以暫不上 immutable。等接 cache-busting query
    # string(?v=hash)後再升級到 max-age=31536000, immutable。
    location /js/ {
        add_header Cache-Control "public, max-age=3600" always;
        try_files $uri =404;
    }

    # ── REST API / artifacts 直接走 backend:8000
    # backend 端的 slowapi 提供 per-route rate limit,FastAPI CORSMiddleware 處理 CORS。
    location /api/ {
        set                $gw_upstream http://backend:8000;
        proxy_pass         $gw_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Authenticated artifact streams: screenshots / videos / robot reports.
    # backend 負責 token 檢查再串 SeaweedFS。
    location /pics/ {
        set                $gw_upstream http://backend:8000;
        proxy_pass         $gw_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_read_timeout 300s;
    }

    location /results/ {
        set                $gw_upstream http://backend:8000;
        proxy_pass         $gw_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_read_timeout 300s;
        # 給自托管 Trace Viewer 用:viewer 頁面 COEP=require-corp 時,任何被它
        # fetch 的 resource(包含 trace.zip)都必須回 CORP 才會被瀏覽器接受。
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
    }

    # ── 容器錄製 noVNC 反代 ──────────────────────────────
    # 把 /recorder/<short_id>/<rest> 反代到容器名為
    # `autotest-recorder-<short_id>` 的 recorder 容器的 6080 port。
    # 之所以走 same-origin 反代而不直接讓瀏覽器連 host published port:
    #   * Chrome 的 HTTPS-First Mode 會把 http://localhost:<random> 升級成
    #     https://,recorder 沒 TLS → ERR_EMPTY_RESPONSE。同 host:80
    #     就不會被升級。
    #   * Edge / 各家瀏覽器的 cross-host loopback / PNA preflight 也會
    #     觸發各種詭異行為,走同源完全避開。
    # 短 id 是 session UUID 的前 8 字元(對應 backend container_name)。
    # WebSocket 升級給 /websockify 用。
    location ~ ^/recorder/(?<rec_sess>[A-Za-z0-9]+)/(?<rec_path>.*)$ {
        set                 $rec_upstream http://autotest-recorder-$rec_sess:6080;
        proxy_pass          $rec_upstream/$rec_path$is_args$args;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection $connection_upgrade;
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        # 長閒置 WebSocket(一場錄製可能十幾分鐘什麼都沒按)
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        # VNC frame 立即 flush,不要 buffer
        proxy_buffering     off;
        # recorder 容器可能還沒起來(race),回 502 比 timeout 友善
        proxy_connect_timeout 5s;
    }

    # ── WebSocket 升級反代 ────────────────────────────────
    location /ws/ {
        set                 $gw_upstream http://backend:8000;
        proxy_pass          $gw_upstream$request_uri;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # ── gzip ─────────────────────────────────────────────
    # Perf A3:加 gzip_static(若旁邊有 .gz 預壓檔直接送,不重壓)、調 comp_level
    # 到 6(品質/CPU 折衷)、加 svg+xml 進 gzip_types。
    gzip on;
    gzip_static on;
    gzip_comp_level 6;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;
}
