server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ── SPA fallback ─────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── REST API 反代到 backend:8000 ─────────────────────
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── 截圖靜態檔 ───────────────────────────────────────
    # local 模式 (STORAGE_BACKEND=local)：FastAPI mount /pics
    # minio 模式：建議改用 /pics/ → minio:9000/pic/ 反代（見下方 minio block）
    location /pics/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── MinIO 反代：報表 (results bucket) ────────────────
    # log.html / report.html / output.xml 與 step screenshots
    location /results/ {
        proxy_pass         http://minio:9000/results/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_buffering    off;
    }

    # ── MinIO 反代：截圖 (pic bucket)，供 STORAGE_BACKEND=minio 使用 ──
    location /pic/ {
        proxy_pass         http://minio:9000/pic/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_buffering    off;
    }

    # ── WebSocket 升級反代 ───────────────────────────────
    location /ws/ {
        proxy_pass          http://backend:8000;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host $host;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # ── gzip ─────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss text/javascript;
    gzip_min_length 1024;
}
