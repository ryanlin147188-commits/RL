services:
  # ── PostgreSQL：原 MySQL，改為 PostgreSQL（PostgreSQL License，類 MIT）─────────
  postgres:
    image: postgres:16-alpine
    container_name: autotest-postgres
    restart: unless-stopped
    environment:
      # 預設帳密 admin / admin123（首次啟動建立 user + database）
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin123}
      POSTGRES_DB: ${DB_NAME:-autotest_db}
      TZ: Asia/Taipei
      PGTZ: Asia/Taipei
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # 註：不掛 init_schema.sql；表結構由 backend lifespan 的 init_db() →
      # SQLAlchemy create_all() 依 app/models 自動建立（型別 / 欄位永遠與程式同步）。
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d ${DB_NAME:-autotest_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Valkey：原 Redis，改為 Valkey（BSD-3，Redis fork by Linux Foundation）──────
  valkey:
    image: valkey/valkey:8-alpine
    container_name: autotest-valkey
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── SeaweedFS：原 MinIO，改為 SeaweedFS（Apache 2.0）──────────────────────────
  # 使用 all-in-one 模式（master + volume + filer + s3 一起啟動）
  # S3 API port: 8333；Master HTTP（healthcheck）: 9333；不對外暴露 master/volume
  seaweedfs:
    image: chrislusf/seaweedfs:3.80
    container_name: autotest-seaweedfs
    restart: unless-stopped
    command: >
      server
      -dir=/data
      -s3
      -s3.config=/etc/seaweedfs/s3-config.json
      -master.volumePreallocate=false
      -metricsPort=9091
    volumes:
      - seaweedfs_data:/data
      - ./seaweedfs-s3.json:/etc/seaweedfs/s3-config.json:ro
    ports:
      - "8333:8333"   # S3 API
      - "9333:9333"   # Master / dashboard
    healthcheck:
      # SeaweedFS master 9333 binds IPv4-only；用 127.0.0.1 避免 localhost → IPv6 解析失敗
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:9333/cluster/status | grep -q IsLeader || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # 一次性 bucket 建立（使用 aws-cli image 直接打 SeaweedFS S3 API）
  seaweedfs-init:
    image: amazon/aws-cli:2.18.5
    container_name: autotest-seaweedfs-init
    depends_on:
      seaweedfs:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-admin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-admin123}
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: >
      /bin/sh -c "
      aws --endpoint-url http://seaweedfs:8333 s3 mb s3://pic 2>/dev/null || true;
      aws --endpoint-url http://seaweedfs:8333 s3 mb s3://results 2>/dev/null || true;
      echo 'SeaweedFS buckets ready: pic, results';
      "
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: autotest-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      TZ: Asia/Taipei
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-admin}
      DB_PASSWORD: ${DB_PASSWORD:-admin123}
      DB_NAME: ${DB_NAME:-autotest_db}
      REDIS_URL: redis://valkey:6379/0
      PIC_FOLDER: /app/PIC
      BASE_URL: ${BASE_URL:-http://localhost}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      # MINIO_* 環境變數沿用作為「S3 端點」設定（內容指向 SeaweedFS）
      MINIO_ENDPOINT: http://seaweedfs:8333
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-admin123}
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DEBUG: "False"
    volumes:
      - pic_data:/app/PIC
      # 掛入 docker socket，讓 /api/system/status 能查詢 Docker 狀態
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:8000"

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile.celery
    container_name: autotest-celery
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      TZ: Asia/Taipei
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-admin}
      DB_PASSWORD: ${DB_PASSWORD:-admin123}
      DB_NAME: ${DB_NAME:-autotest_db}
      REDIS_URL: redis://valkey:6379/0
      PIC_FOLDER: /app/PIC
      BASE_URL: ${BASE_URL:-http://localhost}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      MINIO_ENDPOINT: http://seaweedfs:8333
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-admin123}
      PLAYWRIGHT_HEADLESS: ${PLAYWRIGHT_HEADLESS:-1}
      ROBOT_RUNNER_IMAGE: ${ROBOT_RUNNER_IMAGE:-autotest-robot-runner:latest}
      # 與下方 networks.default.name 保持一致
      ROBOT_RUNNER_NETWORK: ${ROBOT_RUNNER_NETWORK:-autotest_default}
    volumes:
      - pic_data:/app/PIC
      # 把 host 的 docker daemon 開放給 celery worker 用（spawn 子容器時呼叫）
      - /var/run/docker.sock:/var/run/docker.sock

  frontend:
    image: nginx:1.27-alpine
    container_name: autotest-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./index.html:/usr/share/nginx/html/index.html:ro

volumes:
  postgres_data:
  pic_data:
  seaweedfs_data:

networks:
  default:
    # 固定 network 名稱；spawn 容器要附加到這個 network 才能解析
    # postgres / valkey / seaweedfs 服務名
    name: autotest_default
