#
# Single Compose entrypoint.
# - Source build: docker compose up -d --build
# - Preloaded image bundle: docker compose up -d --no-build
# - Backend debug: AUTOTEST_DEBUG=True docker compose up -d --force-recreate backend
#
# 注意:container log rotation 沒寫進每個 service 的 ``logging:`` block(會多
# 16 處 boilerplate),改為部署時在 host 端設一份 ``/etc/docker/daemon.json``:
#
#     {"log-driver": "json-file", "log-opts": {"max-size": "10m", "max-file": "3"}}
#
# 然後 ``sudo systemctl restart docker``。所有 container 的 log 都會走 10MB ×
# 3 份 = 30MB 上限。詳見 README v1.1.8.x 部署段落。
#
services:
  # ── PostgreSQL：原 MySQL，改為 PostgreSQL（PostgreSQL License，類 MIT）─────────
  postgres:
    image: postgres:16-alpine
    container_name: autotest-postgres
    restart: unless-stopped
    command: >
      postgres
      -c wal_level=replica
      -c max_wal_senders=5
      -c max_replication_slots=5
      -c hot_standby=on
    environment:
      # 預設 DB user 為 admin；DB_PASSWORD 必須由 .env 提供
      # (沒 .env 時:`docker compose --profile init run --rm bootstrap` 自動產一份)。
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required - run docker compose --profile init run --rm bootstrap}
      POSTGRES_DB: ${DB_NAME:-autotest_db}
      TZ: Asia/Taipei
      PGTZ: Asia/Taipei
      REPLICA_USER: ${REPLICA_USER:-replicator}
      REPLICA_PASSWORD: ${REPLICA_PASSWORD:-}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # 註：不掛 init_schema.sql；表結構由 backend lifespan 的 init_db() →
      # Alembic upgrade head 建立/遷移，避免啟動時散落 raw SQL。
      - ./scripts/primary-init.sh:/docker-entrypoint-initdb.d/01_primary_init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d ${DB_NAME:-autotest_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── PostgreSQL Replica：streaming replication 熱備（讀取 + 備份來源）──────────
  postgres-replica:
    image: postgres:16-alpine
    container_name: autotest-postgres-replica
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGDATA: /var/lib/postgresql/data
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-autotest_db}
      PRIMARY_HOST: postgres
      PRIMARY_PORT: 5432
      REPLICA_USER: ${REPLICA_USER:-replicator}
      REPLICA_PASSWORD: ${REPLICA_PASSWORD:?REPLICA_PASSWORD is required - run setup-replica.sh or bootstrap}
      TZ: Asia/Taipei
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
      - ./scripts/replica-init.sh:/replica-init.sh:ro
    entrypoint: ["/bin/bash", "/replica-init.sh"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d ${DB_NAME:-autotest_db}"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 120s

  # ── Backup Cron：每日 03:00 從 replica 備份 PostgreSQL + SeaweedFS ────────────
  backup-cron:
    image: postgres:16-alpine
    container_name: autotest-backup-cron
    restart: unless-stopped
    depends_on:
      postgres-replica:
        condition: service_healthy
    environment:
      DB_USER: ${DB_USER:-admin}
      DB_NAME: ${DB_NAME:-autotest_db}
      PGPASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-7}
      TZ: Asia/Taipei
    volumes:
      - seaweedfs_data:/seaweedfs_data:ro
      - backup_data:/backups
      - ./scripts/container-backup.sh:/backup.sh:ro
    command: >
      sh -c "
        echo '0 3 * * * sh /backup.sh >> /backups/cron.log 2>&1' | crontab - &&
        echo '[backup-cron] scheduled at 03:00 Asia/Taipei daily' &&
        crond -f -l 6
      "

  # ── Valkey：原 Redis，改為 Valkey（BSD-3，Redis fork by Linux Foundation）──────
  valkey:
    image: valkey/valkey:8-alpine
    container_name: autotest-valkey
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Qdrant 向量資料庫(v1.2.x mem0 後端) ────────────────────────────────────
  # mem0 需要 vector store 做 semantic search;Qdrant 是輕量單一 binary。
  # 純內網用,不對 host 公開 port;只透過 docker network 給 mem0-sidecar 連。
  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: autotest-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    # qdrant image 是 distroless,沒 sh/curl 可做 healthcheck;
    # 改在 mem0-sidecar 端用 startup retry 處理,這裡只判斷 service_started。

  # ── mem0 sidecar(v1.2.x 跨 session 長期記憶) ─────────────────────────────
  # FastAPI 包 mem0ai 套件;backend 透過 X-Sidecar-Auth header 呼叫。
  # 每次 API call 由 backend 帶該 org 的 LLM config(reuse RL 的 LlmProviderConfig)
  # — 不必在 sidecar 環境變數塞 OPENAI key,單一 sidecar 服務多 org。
  mem0-sidecar:
    build:
      context: .
      dockerfile: mem0-sidecar/Dockerfile
    image: autotest-mem0-sidecar:${AUTOTEST_TAG:-1.2.0}
    container_name: autotest-mem0
    restart: unless-stopped
    environment:
      MEM0_SIDECAR_AUTH: ${MEM0_SIDECAR_AUTH:?MEM0_SIDECAR_AUTH is required}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
    depends_on:
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7900/healthz', timeout=2)"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Docker API proxy:backend/celery 只連受限 TCP proxy,不直接掛 docker.sock ──
  docker-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    container_name: autotest-docker-proxy
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      BUILD: 1
      POST: 1
      PING: 1
      INFO: 1
      VERSION: 1
      SYSTEM: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  # ── SeaweedFS：原 MinIO，改為 SeaweedFS（Apache 2.0）──────────────────────────
  # 使用 all-in-one 模式（master + volume + filer + s3 一起啟動）
  # S3 API port: 8333；Master HTTP（healthcheck）: 9333；不對外暴露 master/volume
  seaweedfs:
    image: chrislusf/seaweedfs:3.80
    container_name: autotest-seaweedfs
    restart: unless-stopped
    command: >
      server
      -dir=/data
      -s3
      -s3.config=/etc/seaweedfs/s3-config.json
      -master.volumePreallocate=false
      -metricsPort=9091
    volumes:
      - seaweedfs_data:/data
    configs:
      - source: seaweedfs_s3_config
        target: /etc/seaweedfs/s3-config.json
    healthcheck:
      # SeaweedFS master 9333 binds IPv4-only；用 127.0.0.1 避免 localhost → IPv6 解析失敗
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:9333/cluster/status | grep -q IsLeader || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # v1.1.9 移除 seaweedfs-init service:backend lifespan 已用內建 boto3
  # 直接 create_bucket(idempotent)。避免為了兩行 `aws s3 mb` 拉一份
  # amazon/aws-cli image(~500MB)。

  backend:
    image: autotest-backend:${AUTOTEST_TAG:-1.1.1}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: autotest-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      docker-proxy:
        condition: service_started
      # v1.1.9:lifespan 自己用 boto3 建 bucket(取代 seaweedfs-init service),
      # 所以 backend 必須等 seaweedfs healthy 才上;否則 startup 那行
      # create_bucket 會 connect refused。
      seaweedfs:
        condition: service_healthy
    environment:
      TZ: Asia/Taipei
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-admin}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required - run docker compose --profile init run --rm bootstrap}
      DB_NAME: ${DB_NAME:-autotest_db}
      REDIS_URL: redis://valkey:6379/0
      # PIC_FOLDER:容器內暫存路徑,給 robot listener / recorder session 寫
      # 中介檔(產出後立刻上傳到 SeaweedFS 再刪)。不是持久化儲存;真正的
      # 業務檔案一律走 STORAGE_BACKEND=s3 → SeaweedFS。
      PIC_FOLDER: /app/PIC
      BASE_URL: ${BASE_URL:-http://localhost}
      # STORAGE_BACKEND 必填,只接受 's3'(背後接 SeaweedFS)。
      # 設成其他值或不設都會讓 stack 啟動失敗,避免上傳偷偷寫到容器本機。
      STORAGE_BACKEND: ${STORAGE_BACKEND:?STORAGE_BACKEND is required and must be 's3' (SeaweedFS via S3-compatible API; set STORAGE_BACKEND=s3 in .env)}
      # SeaweedFS 的 S3-compatible 端點與 IAM credentials
      S3_ENDPOINT: http://seaweedfs:8333
      S3_ACCESS_KEY: ${S3_ROOT_USER:-admin}
      S3_SECRET_KEY: ${S3_ROOT_PASSWORD:?S3_ROOT_PASSWORD is required - run docker compose --profile init run --rm bootstrap}
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DEBUG: ${AUTOTEST_DEBUG:-False}
      # CORS 白名單(逗號分隔);公開部署請改為實際前端 origin。
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
      # 應用層 secret(必填):JWT 簽章 + Fernet 對稱加密金鑰
      AUTOTEST_JWT_SECRET: ${AUTOTEST_JWT_SECRET:?AUTOTEST_JWT_SECRET is required - run docker compose --profile init run --rm bootstrap}
      AUTOTEST_FERNET_KEY: ${AUTOTEST_FERNET_KEY:?AUTOTEST_FERNET_KEY is required - run docker compose --profile init run --rm bootstrap}
      # v1.1.14 P1-4:初始 admin 帳號密碼(必填)。
      # 移除 admin123 fallback,bootstrap service 會隨機產生並寫入 .env;
      # 既有 .env 升級時需手動加一行(例 `openssl rand -hex 16`)。
      # 首次登入仍會被 must_change_password 強制改一次,之後此 env 不再被讀取。
      AUTOTEST_DEFAULT_ADMIN_PASSWORD: ${AUTOTEST_DEFAULT_ADMIN_PASSWORD:?AUTOTEST_DEFAULT_ADMIN_PASSWORD is required - run docker compose --profile init run --rm bootstrap (or set it manually in .env)}
      # ── Docker 模式錄製 ──
      # v1.1.9 起 recorder / recorder-api / mcp 合併成單一 image,
      # 靠 RECORDER_MODE env 切 entrypoint;RECORDER_API_IMAGE / MCP_IMAGE
      # 已移除,backend Settings 的 ``extra="ignore"`` 保證 .env 殘留不會炸。
      RECORDER_IMAGE: ${RECORDER_IMAGE:-autotest-recorder:1.1.1}
      RECORDER_NETWORK: ${RECORDER_NETWORK:-autotest_default}
      RECORDER_INTERNAL_BASE_URL: http://backend:8000
      RECORDER_IDLE_TIMEOUT_MIN: 30
      # ── mem0 跨 session 長期記憶(v1.2.x)─────────────────────────────
      # 留空 → MemoryClient 走 fail-open(send_message 仍正常,只是無 memory)
      MEM0_SIDECAR_URL: ${MEM0_SIDECAR_URL:-http://mem0-sidecar:7900}
      MEM0_SIDECAR_AUTH: ${MEM0_SIDECAR_AUTH:-}
      DOCKER_HOST: tcp://docker-proxy:2375
      # ── Zoho OIDC(v1.1.5,authlib in-process)──
      # 不設 client_id / secret 時 ``/api/auth/zoho/login`` 回 503,SPA 自動隱藏
      # 「使用 Zoho 登入」按鈕。後台同時提供密碼登入,即使 Zoho 沒設仍可運作。
      ZOHO_CLIENT_ID: ${ZOHO_CLIENT_ID:-}
      ZOHO_CLIENT_SECRET: ${ZOHO_CLIENT_SECRET:-}
      ZOHO_REDIRECT_URL: ${ZOHO_REDIRECT_URL:-http://localhost/api/auth/zoho/callback}
      ZOHO_OIDC_BASE: ${ZOHO_OIDC_BASE:-https://accounts.zoho.com}
      # ── Casbin enforcer(v1.1.5 預設 True,跟 Casdoor 解耦後 in-process 純跑 Python)──
      # CASBIN_ENABLED=False 時 require_casbin fall back 到 list[str] 檢查
      # (跟 require_permission 等價);True 時用 casbin_rule 表 + RBAC-with-domains。
      CASBIN_ENABLED: ${CASBIN_ENABLED:-True}
      # Shadow mode:啟用後 require_permission 同時跑 Casbin 比對並把差異 log
      # 到 ``app.auth.permissions.shadow``,但不改變實際 allow/deny。前置條件:
      # CASBIN_ENABLED=True 且已跑過 ``python -m app.cli seed-casbin``。
      CASBIN_SHADOW_ENABLED: ${CASBIN_SHADOW_ENABLED:-False}
      # ── Gateway short-circuit(v1.1.10)──
      # 跟 gateway 共享的 HMAC secret。v1.1.13 起改為強制必填(無 secret
      # 會讓繞 gateway 直打 backend 的請求跳過限流/revocation 檢查)。
      # 用 `docker compose --profile init run --rm bootstrap` 自動產生。
      GATEWAY_BACKEND_SHARED_SECRET: ${GATEWAY_BACKEND_SHARED_SECRET:?GATEWAY_BACKEND_SHARED_SECRET is required - run docker compose --profile init run --rm bootstrap}
      # v1.1.13:設 True 後缺合法 gateway HMAC 一律 401(不退回 JWT 直驗)。
      # 預設 True 完成信任邊界收斂:browser → nginx:80 → gateway:9000 → backend:8000
      # 是唯一允許路徑;backend 8000 在這份 compose 從未對外 publish(見下方註解),
      # 配合此旗標可確保「即使有人能進 host 也無法繞 gateway 打 backend」。
      # 本機開發要直接 curl backend(例如 debug)時,在 .env 加一行
      # BACKEND_TRUST_GATEWAY_ONLY=False 覆蓋。
      # 受影響的路徑:
      #   - /healthz、/pics/、/results/、/api/recordings/.../upload(-har) 等 public
      #     path 仍照 _PUBLIC_PATTERNS 放行(recorder 容器 curl 上傳不受影響)
      #   - 其他 /api/* 一律需帶合法 X-Gateway-Verified HMAC(由 gateway 簽)
      BACKEND_TRUST_GATEWAY_ONLY: ${BACKEND_TRUST_GATEWAY_ONLY:-True}
    # /healthz 是公開、無需 auth 的就緒探測;讓 frontend(depends_on backend)
    # 等到 backend 的 lifespan 跑完(含 alembic upgrade head)才往下走。
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    # v1.1.13 信任邊界收斂:`ports:` 段刻意不存在(不對 host publish 8000)。
    # 對外流量唯一允許路徑: browser → frontend nginx:80/443 → gateway:9000 → backend:8000
    # 同網路內(celery / frontend / recorder)以 backend:8000 解析,不需 host port。
    # 配合 BACKEND_TRUST_GATEWAY_ONLY=True 後,即使 host 上有人能存取 backend
    # 容器網路,沒帶 gateway HMAC 也是 401。
    # 動態錄製容器會 publish 到 host 的 6080-6200 區段 port,不在 backend 區塊另外 expose。

  celery:
    image: autotest-celery:${AUTOTEST_TAG:-1.1.1}
    build:
      context: ./backend
      dockerfile: Dockerfile.celery
    container_name: autotest-celery
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      docker-proxy:
        condition: service_started
    environment:
      TZ: Asia/Taipei
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-admin}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required - run docker compose --profile init run --rm bootstrap}
      DB_NAME: ${DB_NAME:-autotest_db}
      REDIS_URL: redis://valkey:6379/0
      # PIC_FOLDER:robot listener 寫產物的暫存路徑,跑完上傳到 SeaweedFS 即丟。
      PIC_FOLDER: /app/PIC
      BASE_URL: ${BASE_URL:-http://localhost}
      # STORAGE_BACKEND 必填(同 backend 區塊),強制走 SeaweedFS。
      STORAGE_BACKEND: ${STORAGE_BACKEND:?STORAGE_BACKEND is required and must be 's3' (SeaweedFS via S3-compatible API; set STORAGE_BACKEND=s3 in .env)}
      S3_ENDPOINT: http://seaweedfs:8333
      S3_ACCESS_KEY: ${S3_ROOT_USER:-admin}
      S3_SECRET_KEY: ${S3_ROOT_PASSWORD:?S3_ROOT_PASSWORD is required - run docker compose --profile init run --rm bootstrap}
      PLAYWRIGHT_HEADLESS: ${PLAYWRIGHT_HEADLESS:-1}
      # Celery worker 也會 import app.* 模組,需要相同的 secret(必填)
      AUTOTEST_JWT_SECRET: ${AUTOTEST_JWT_SECRET:?AUTOTEST_JWT_SECRET is required - run docker compose --profile init run --rm bootstrap}
      AUTOTEST_FERNET_KEY: ${AUTOTEST_FERNET_KEY:?AUTOTEST_FERNET_KEY is required - run docker compose --profile init run --rm bootstrap}
      ROBOT_RUNNER_IMAGE: ${ROBOT_RUNNER_IMAGE:-autotest-robot-runner:1.1.1}
      # 與下方 networks.default.name 保持一致
      ROBOT_RUNNER_NETWORK: ${ROBOT_RUNNER_NETWORK:-autotest_default}
      DOCKER_HOST: tcp://docker-proxy:2375
      # Casbin enforcer 在 celery worker 進程內也用得到(mutation hook 透過 task
      # 跑 rebuild_user_grants 時要 init enforcer);跟 backend 共享同一個
      # CASBIN_ENABLED gate。
      CASBIN_ENABLED: ${CASBIN_ENABLED:-True}

  # ── API Gateway(v1.1.10 新增)─────────────────────────────
  # 在 nginx 後面、backend 前面的 Python FastAPI 流量入口。
  # 負責:JWT 驗證、限速、CORS、X-Request-Id 串接、Backend HMAC short-circuit。
  # Commit 2 加 WebSocket proxy(修現有 /ws/executions 沒 auth 的漏洞);
  # Commit 3 加熔斷 + 動態路由;Commit 4 加 API key + structlog + prometheus。
  gateway:
    image: autotest-gateway:${AUTOTEST_TAG:-1.1.1}
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: autotest-gateway
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      TZ: Asia/Taipei
      BACKEND_URL: http://backend:8000
      # JWT secret 跟 backend 共享(同一份 .env 變數),gateway 用它 decode 上行 JWT
      AUTOTEST_JWT_SECRET: ${AUTOTEST_JWT_SECRET:?AUTOTEST_JWT_SECRET is required - run docker compose --profile init run --rm bootstrap}
      # Gateway↔Backend HMAC — v1.1.13 起強制必填(供應商繞 gateway 直連 backend 防護)
      GATEWAY_BACKEND_SHARED_SECRET: ${GATEWAY_BACKEND_SHARED_SECRET:?GATEWAY_BACKEND_SHARED_SECRET is required - run docker compose --profile init run --rm bootstrap}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
      # 限速 storage(Commit 3 才用到,先預埋)
      REDIS_URL: redis://valkey:6379/2
      LOG_LEVEL: ${GATEWAY_LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    # 不對外 publish 9000;frontend nginx 內部 proxy_pass 過來。

  frontend:
    image: autotest-frontend:${AUTOTEST_TAG:-1.1.1}
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: autotest-frontend
    restart: unless-stopped
    depends_on:
      # v1.1.10:nginx 改 proxy_pass 到 gateway:9000,所以 startup 順序要等
      # gateway healthy(gateway 自己 depends_on backend healthy → 鏈式 ready)
      gateway:
        condition: service_healthy
    ports:
      # 0.0.0.0:80 — 對 LAN 開放(本機部署也能 http://localhost/)。
      # 公開 internet 部署請改回 127.0.0.1:80:8080 並前面套 reverse proxy + TLS。
      # v1.1.14 P1-3:container 內 nginx 改 unprivileged,實際聽 8080/8443,
      # docker publish 把 host 80/443 對應過去,對外體驗不變。
      - "80:8080"
      # HTTPS 自簽憑證(image 內 build-time 產);Playwright Trace Viewer 需要
      # cross-origin isolation + secure context 才能用 SharedArrayBuffer,
      # 純 HTTP 192.168.x.x 不算 secure context → 必須走 HTTPS。
      - "443:8443"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/index.html:/usr/share/nginx/html/index.html:ro
      - ./frontend/tailwind.css:/usr/share/nginx/html/tailwind.css:ro
      - ./frontend/js:/usr/share/nginx/html/js:ro
  robot-runner:
    build:
      context: ./backend
      dockerfile: Dockerfile.runner
    image: autotest-robot-runner:1.1.1
    profiles: ["spawnable"]
    command: ["true"]   # never started; defensive no-op if profile is misused
    restart: "no"

  # v1.1.9 起 recorder / recorder-api / mcp 三個 image 合併成一份
  # autotest-recorder,由 dispatcher entrypoint 依 RECORDER_MODE env 切
  # novnc / mitmweb / mcp 三種模式。backend spawn 時注入該 env。
  recorder:
    build:
      context: ./backend
      dockerfile: Dockerfile.recorder
    image: autotest-recorder:1.1.1
    profiles: ["spawnable"]
    command: ["true"]
    restart: "no"

  # ── Bootstrap secrets(profile=init:首次部署用,跑完即丟) ──────────
  # 自動產生 .env 隨機 secret。第一次部署用一次,之後 .env 已存在會跳過。
  # 用法:
  #   docker compose --profile init run --rm bootstrap
  # 行為:
  #   * 若 .env 已存在 → 不覆寫,印 INFO 後 exit 0
  #   * 若 .env 不存在 → 用 openssl 產隨機 secrets 寫入,印 OK 後 exit 0
  bootstrap:
    image: alpine:3.20
    profiles: ["init"]
    working_dir: /work
    volumes:
      - .:/work
    entrypoint:
      - sh
      - -c
      - |
        set -e
        apk add --no-cache openssl coreutils >/dev/null
        if [ -f /work/.env ]; then
          echo "[INFO] .env already exists — skipping (delete it first to regenerate)"
          exit 0
        fi
        DB_PWD=$$(openssl rand -hex 24)
        S3_PWD=$$(openssl rand -hex 24)
        JWT=$$(openssl rand -hex 32)
        # Fernet key = urlsafe-b64(32 raw bytes), 44 chars with `=` padding.
        FERNET=$$(openssl rand 32 | base64 -w 0 | tr '+/' '-_')
        REPLICA_PWD=$$(openssl rand -hex 24)
        # v1.1.10:Gateway 跟 backend 之間的 HMAC secret(短路 JWT decode 用)
        GW_SECRET=$$(openssl rand -hex 32)
        # v1.1.14 P1-4:初始 admin 密碼改為隨機產生,移除 admin123 預設值。
        # 維運人員看橫幅一次,搭配 must_change_password=True 第一次登入立即改。
        ADMIN_PWD=$$(openssl rand -hex 16)
        cat > /work/.env <<EOF
        # AutoTest deployment secrets (auto-generated by bootstrap service).
        # Do not commit. Rotate periodically.
        DB_USER=admin
        DB_PASSWORD=$$DB_PWD
        DB_NAME=autotest_db
        BASE_URL=http://localhost
        ALLOWED_ORIGINS=http://localhost
        STORAGE_BACKEND=s3
        S3_ROOT_USER=admin
        S3_ROOT_PASSWORD=$$S3_PWD
        AUTOTEST_JWT_SECRET=$$JWT
        AUTOTEST_FERNET_KEY=$$FERNET
        GATEWAY_BACKEND_SHARED_SECRET=$$GW_SECRET
        # v1.1.14 P1-4:初始 admin 密碼(隨機 16 bytes hex = 32 字元)。
        # 維運記錄此值;首次登入會被強制改密碼,改完即可從 .env 移除此行。
        AUTOTEST_DEFAULT_ADMIN_PASSWORD=$$ADMIN_PWD
        # v1.1.13:信任邊界 = gateway,backend 一律要求 gateway HMAC。
        # 本機要直接 curl backend 除錯時改 False。
        BACKEND_TRUST_GATEWAY_ONLY=True
        REPLICA_USER=replicator
        REPLICA_PASSWORD=$$REPLICA_PWD
        BACKUP_KEEP_DAYS=7
        EOF
        echo "[OK] .env created with random secrets"
        echo ""
        echo "  ╔══════════════════════════════════════════════════════════════════╗"
        echo "  ║  Initial admin credentials — RECORD THIS NOW (shown only once): ║"
        echo "  ║    Username: admin                                               ║"
        echo "  ║    Password: $$ADMIN_PWD"
        echo "  ║  You will be forced to change it on first login.                 ║"
        echo "  ╚══════════════════════════════════════════════════════════════════╝"
    restart: "no"

volumes:
  postgres_data:
  seaweedfs_data:
  postgres_replica_data:
  backup_data:
  qdrant_data:

# SeaweedFS S3 IAM 設定:從 .env 注入,docker compose 會在啟動時做變數替換。
# 修改後須 docker compose down -v 並 up 才能重新生效(SeaweedFS 啟動時讀一次)。
configs:
  seaweedfs_s3_config:
    # v1.1.14 P1-2:移除 ``anonymous: Read`` identity。改後 SeaweedFS 一律要求帶
    # access key / secret key 才能讀寫;backend + celery 透過 boto3 用
    # ${S3_ROOT_USER}/${S3_ROOT_PASSWORD} 仍可正常存取。即使有人能進到 docker
    # network 內也無法匿名拉取 /pics /results 等 artifact 物件。
    content: |
      {
        "identities": [
          {
            "name": "${S3_ROOT_USER:-admin}",
            "credentials": [
              {
                "accessKey": "${S3_ROOT_USER:-admin}",
                "secretKey": "${S3_ROOT_PASSWORD:?S3_ROOT_PASSWORD is required - run docker compose --profile init run --rm bootstrap}"
              }
            ],
            "actions": ["Admin", "Read", "Write", "List", "Tagging"]
          }
        ]
      }

networks:
  default:
    # 固定 network 名稱；spawn 容器要附加到這個 network 才能解析
    # postgres / valkey / seaweedfs 服務名
    name: autotest_default
