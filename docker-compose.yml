services:
  mysql:
    image: mysql:8.0
    container_name: autotest-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_DATABASE: ${DB_NAME:-autotest_db}
      TZ: Asia/Taipei
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/migrations/init_schema.sql:/docker-entrypoint-initdb.d/01_init_schema.sql:ro
    ports:
      - "3306:3306"
    healthcheck:
      test:
        ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD:-password}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: autotest-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: autotest-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    container_name: autotest-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb -p local/pic || true;
      mc mb -p local/results || true;
      mc anonymous set download local/pic;
      mc anonymous set download local/results;
      echo 'MinIO buckets ready';
      "
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: autotest-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # 與 mysql 容器一致使用本地時區；排程比較時間 / 報表 created_at 才會與前端一致
      TZ: Asia/Taipei
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: ${DB_NAME:-autotest_db}
      REDIS_URL: redis://redis:6379/0
      PIC_FOLDER: /app/PIC
      BASE_URL: ${BASE_URL:-http://localhost}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DEBUG: "False"
    volumes:
      - pic_data:/app/PIC
    ports:
      - "8000:8000"

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile.celery
    container_name: autotest-celery
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TZ: Asia/Taipei
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: ${DB_NAME:-autotest_db}
      REDIS_URL: redis://redis:6379/0
      PIC_FOLDER: /app/PIC
      BASE_URL: ${BASE_URL:-http://localhost}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      # 容器內預設用 headless；如需 headed demo，改成 "0" 並確保 Xvfb 已啟動
      PLAYWRIGHT_HEADLESS: ${PLAYWRIGHT_HEADLESS:-1}
      # ── Spawn 模式（execution_mode=docker）─────────────────────
      # ROBOT_RUNNER_IMAGE：每個 case 啟動的獨立容器使用的 image
      #   預設值會被 docker-compose build 時建立的 autotest-robot-runner（FROM ppodgorsek/robot-framework）取代
      # ROBOT_RUNNER_NETWORK：spawn 容器要附加的 docker network，必須能連到 minio / redis
      ROBOT_RUNNER_IMAGE: ${ROBOT_RUNNER_IMAGE:-autotest-robot-runner:latest}
      # 與下方 networks.default.name 保持一致；不再依賴 compose 自動由目錄名衍生的網段名稱
      # （目錄名可能是 Windows 的 autotest_v1.0_20260420 或 Linux 的 autotest，不一致）
      ROBOT_RUNNER_NETWORK: ${ROBOT_RUNNER_NETWORK:-autotest_default}
    volumes:
      - pic_data:/app/PIC
      # 把 host 的 docker daemon 開放給 celery worker 用（spawn 子容器時呼叫）
      # ⚠ 這等同 root 權限；正式部署請改用 docker-socket-proxy 限制 API 權限
      - /var/run/docker.sock:/var/run/docker.sock

  frontend:
    # 直接用官方 nginx image，無需自訂 Dockerfile / build step。
    # 進入頁與 nginx 設定皆以唯讀 volume 掛載；要改檔重啟 frontend 容器即可生效。
    image: nginx:1.27-alpine
    container_name: autotest-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./index.html:/usr/share/nginx/html/index.html:ro

volumes:
  mysql_data:
  pic_data:
  minio_data:

networks:
  default:
    # 固定 network 名稱，避免跨平台（Windows / macOS / Linux）因目錄名不同而產生不同的 default 網段
    # spawn 容器要附加到這個 network 才能解析 minio / redis / mysql 服務名
    name: autotest_default

