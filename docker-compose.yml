#
# Single Compose entrypoint.
# - Source build: docker compose up -d --build
# - Preloaded image bundle: docker compose up -d --no-build
# - Backend debug: AUTOTEST_DEBUG=True docker compose up -d --force-recreate backend
#
services:
  # ── PostgreSQL：原 MySQL，改為 PostgreSQL（PostgreSQL License，類 MIT）─────────
  postgres:
    image: postgres:16-alpine
    container_name: autotest-postgres
    restart: unless-stopped
    environment:
      # 預設 DB user 為 admin；DB_PASSWORD 必須由 .env 提供
      # (沒 .env 時:`docker compose --profile init run --rm bootstrap` 自動產一份)。
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required - run docker compose --profile init run --rm bootstrap}
      POSTGRES_DB: ${DB_NAME:-autotest_db}
      TZ: Asia/Taipei
      PGTZ: Asia/Taipei
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # 註：不掛 init_schema.sql；表結構由 backend lifespan 的 init_db() →
      # Alembic upgrade head 建立/遷移，避免啟動時散落 raw SQL。
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d ${DB_NAME:-autotest_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Valkey：原 Redis，改為 Valkey（BSD-3，Redis fork by Linux Foundation）──────
  valkey:
    image: valkey/valkey:8-alpine
    container_name: autotest-valkey
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Docker API proxy：backend/celery 只連受限 TCP proxy，不直接掛 docker.sock ──
  docker-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    container_name: autotest-docker-proxy
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      BUILD: 1
      POST: 1
      PING: 1
      INFO: 1
      VERSION: 1
      SYSTEM: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  # ── SeaweedFS：原 MinIO，改為 SeaweedFS（Apache 2.0）──────────────────────────
  # 使用 all-in-one 模式（master + volume + filer + s3 一起啟動）
  # S3 API port: 8333；Master HTTP（healthcheck）: 9333；不對外暴露 master/volume
  seaweedfs:
    image: chrislusf/seaweedfs:3.80
    container_name: autotest-seaweedfs
    restart: unless-stopped
    command: >
      server
      -dir=/data
      -s3
      -s3.config=/etc/seaweedfs/s3-config.json
      -master.volumePreallocate=false
      -metricsPort=9091
    volumes:
      - seaweedfs_data:/data
    configs:
      - source: seaweedfs_s3_config
        target: /etc/seaweedfs/s3-config.json
    healthcheck:
      # SeaweedFS master 9333 binds IPv4-only；用 127.0.0.1 避免 localhost → IPv6 解析失敗
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:9333/cluster/status | grep -q IsLeader || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # 一次性 bucket 建立（使用 aws-cli image 直接打 SeaweedFS S3 API）
  seaweedfs-init:
    image: amazon/aws-cli:2.18.5
    container_name: autotest-seaweedfs-init
    depends_on:
      seaweedfs:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: ${S3_ROOT_USER:-admin}
      AWS_SECRET_ACCESS_KEY: ${S3_ROOT_PASSWORD:?S3_ROOT_PASSWORD is required - run docker compose --profile init run --rm bootstrap}
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: >
      /bin/sh -c "
      aws --endpoint-url http://seaweedfs:8333 s3 mb s3://pic 2>/dev/null || true;
      aws --endpoint-url http://seaweedfs:8333 s3 mb s3://results 2>/dev/null || true;
      echo 'SeaweedFS buckets ready: pic, results';
      "
    restart: "no"

  backend:
    image: autotest-backend:${AUTOTEST_TAG:-1.1.1}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: autotest-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      docker-proxy:
        condition: service_started
    environment:
      TZ: Asia/Taipei
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-admin}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required - run docker compose --profile init run --rm bootstrap}
      DB_NAME: ${DB_NAME:-autotest_db}
      REDIS_URL: redis://valkey:6379/0
      # PIC_FOLDER:容器內暫存路徑,給 robot listener / recorder session 寫
      # 中介檔(產出後立刻上傳到 SeaweedFS 再刪)。不是持久化儲存;真正的
      # 業務檔案一律走 STORAGE_BACKEND=s3 → SeaweedFS。
      PIC_FOLDER: /app/PIC
      BASE_URL: ${BASE_URL:-http://localhost}
      # STORAGE_BACKEND 必填,只接受 's3'(背後接 SeaweedFS)。
      # 設成其他值或不設都會讓 stack 啟動失敗,避免上傳偷偷寫到容器本機。
      STORAGE_BACKEND: ${STORAGE_BACKEND:?STORAGE_BACKEND is required and must be 's3' (SeaweedFS via S3-compatible API; set STORAGE_BACKEND=s3 in .env)}
      # SeaweedFS 的 S3-compatible 端點與 IAM credentials
      S3_ENDPOINT: http://seaweedfs:8333
      S3_ACCESS_KEY: ${S3_ROOT_USER:-admin}
      S3_SECRET_KEY: ${S3_ROOT_PASSWORD:?S3_ROOT_PASSWORD is required - run docker compose --profile init run --rm bootstrap}
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DEBUG: ${AUTOTEST_DEBUG:-False}
      # CORS 白名單(逗號分隔);公開部署請改為實際前端 origin。
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
      # 應用層 secret(必填):JWT 簽章 + Fernet 對稱加密金鑰
      AUTOTEST_JWT_SECRET: ${AUTOTEST_JWT_SECRET:?AUTOTEST_JWT_SECRET is required - run docker compose --profile init run --rm bootstrap}
      AUTOTEST_FERNET_KEY: ${AUTOTEST_FERNET_KEY:?AUTOTEST_FERNET_KEY is required - run docker compose --profile init run --rm bootstrap}
      # RFC-8 observability:預設指向 obs profile 的 jaeger;沒啟 obs profile
      # 時 backend 連不到 jaeger,observability.py 會 log warning 後忽略,不擋啟動。
      # 完全停用 tracing → 在 .env 或 compose override 設成空字串。
      OTLP_ENDPOINT: ${OTLP_ENDPOINT:-jaeger:4317}
      SENTRY_DSN: ${SENTRY_DSN:-}
      AUTOTEST_ENV: ${AUTOTEST_ENV:-dev}
      # ── Docker 模式錄製(Phase 1) ──
      RECORDER_IMAGE: ${RECORDER_IMAGE:-autotest-recorder:1.1.1}
      # API 錄製(mitmweb)與 MCP(Playwright MCP server)的 image tag 直通,
      # 讓 .env 可以覆蓋預設值;不設則 fallback 到 app.config.Settings 的預設。
      RECORDER_API_IMAGE: ${RECORDER_API_IMAGE:-autotest-recorder-api:1.1.1}
      MCP_IMAGE: ${MCP_IMAGE:-autotest-mcp:1.1.1}
      RECORDER_NETWORK: ${RECORDER_NETWORK:-autotest_default}
      RECORDER_INTERNAL_BASE_URL: http://backend:8000
      RECORDER_IDLE_TIMEOUT_MIN: 30
      DOCKER_HOST: tcp://docker-proxy:2375
      # ── Hermes sidecar(內網 service-name)──
      # PR2:hermes_client 用這條呼叫 sidecar;HERMES_ENABLED=False 時整個 router 503
      HERMES_BASE_URL: ${HERMES_BASE_URL:-http://hermes:7800}
      SIDECAR_AUTH_TOKEN: ${SIDECAR_AUTH_TOKEN:?SIDECAR_AUTH_TOKEN is required - run docker compose --profile init run --rm bootstrap}
      HERMES_ENABLED: ${HERMES_ENABLED:-True}
      HERMES_TIMEOUT_SEC: ${HERMES_TIMEOUT_SEC:-60}
      HERMES_STREAM_TIMEOUT_SEC: ${HERMES_STREAM_TIMEOUT_SEC:-300}
      # ── mem0 sidecar(語意記憶層,PR3 起接通)──
      MEM0_BASE_URL: ${MEM0_BASE_URL:-http://mem0:7900}
      MEM0_SIDECAR_AUTH_TOKEN: ${MEM0_SIDECAR_AUTH_TOKEN:?MEM0_SIDECAR_AUTH_TOKEN is required - run docker compose --profile init run --rm bootstrap}
      MEM0_ENABLED: ${MEM0_ENABLED:-True}
      MEM0_TIMEOUT_SEC: ${MEM0_TIMEOUT_SEC:-5}
      MEM0_SEARCH_TIMEOUT_SEC: ${MEM0_SEARCH_TIMEOUT_SEC:-3}
      MEM0_PREHOOK_ENABLED: ${MEM0_PREHOOK_ENABLED:-True}
      MEM0_PREHOOK_TOP_K: ${MEM0_PREHOOK_TOP_K:-5}
      MEM0_PREHOOK_THRESHOLD: ${MEM0_PREHOOK_THRESHOLD:-0.3}
      # ── Hermes ↔ mem0 MCP tool(PR3:讓 ACP 子進程的 LLM 主動 invoke)──
      MEM0_HERMES_TOOL_ENABLED: ${MEM0_HERMES_TOOL_ENABLED:-True}
      MEM0_HERMES_TOOL_URL: ${MEM0_HERMES_TOOL_URL:-http://mem0:7900/mcp/mcp}
    # /healthz 是公開、無需 auth 的就緒探測;讓 apisix(depends_on backend)
    # 等到 backend 的 lifespan 跑完(含 alembic upgrade head)才往下走。
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    # 不對外 publish 8000;所有外部流量必須經 frontend nginx → APISIX → backend。
    # 同網路內(celery / apisix / recorder)以 backend:8000 解析,不需 host port。
    # 動態錄製容器會 publish 到 host 的 6080-6200 區段 port,不在 backend 區塊另外 expose。

  celery:
    image: autotest-celery:${AUTOTEST_TAG:-1.1.1}
    build:
      context: ./backend
      dockerfile: Dockerfile.celery
    container_name: autotest-celery
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      docker-proxy:
        condition: service_started
    environment:
      TZ: Asia/Taipei
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-admin}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required - run docker compose --profile init run --rm bootstrap}
      DB_NAME: ${DB_NAME:-autotest_db}
      REDIS_URL: redis://valkey:6379/0
      # PIC_FOLDER:robot listener 寫產物的暫存路徑,跑完上傳到 SeaweedFS 即丟。
      PIC_FOLDER: /app/PIC
      BASE_URL: ${BASE_URL:-http://localhost}
      # STORAGE_BACKEND 必填(同 backend 區塊),強制走 SeaweedFS。
      STORAGE_BACKEND: ${STORAGE_BACKEND:?STORAGE_BACKEND is required and must be 's3' (SeaweedFS via S3-compatible API; set STORAGE_BACKEND=s3 in .env)}
      S3_ENDPOINT: http://seaweedfs:8333
      S3_ACCESS_KEY: ${S3_ROOT_USER:-admin}
      S3_SECRET_KEY: ${S3_ROOT_PASSWORD:?S3_ROOT_PASSWORD is required - run docker compose --profile init run --rm bootstrap}
      PLAYWRIGHT_HEADLESS: ${PLAYWRIGHT_HEADLESS:-1}
      # Celery worker 也會 import app.* 模組,需要相同的 secret(必填)
      AUTOTEST_JWT_SECRET: ${AUTOTEST_JWT_SECRET:?AUTOTEST_JWT_SECRET is required - run docker compose --profile init run --rm bootstrap}
      AUTOTEST_FERNET_KEY: ${AUTOTEST_FERNET_KEY:?AUTOTEST_FERNET_KEY is required - run docker compose --profile init run --rm bootstrap}
      ROBOT_RUNNER_IMAGE: ${ROBOT_RUNNER_IMAGE:-autotest-robot-runner:1.1.1}
      # 與下方 networks.default.name 保持一致
      ROBOT_RUNNER_NETWORK: ${ROBOT_RUNNER_NETWORK:-autotest_default}
      DOCKER_HOST: tcp://docker-proxy:2375

  # ── Hermes Agent sidecar ──────────────────────────────────────────────
  # NousResearch Hermes Agent (https://github.com/NousResearch/hermes-agent, MIT)
  # 跑成獨立容器,backend 透過 :7800 內網呼叫;不對 host 暴露 port。
  # PR1 階段:supervisor 只回 /healthz 確認容器跑得起來 — ACP 子進程池與
  # sessions/skills/cron/gateway 路由在後續 PR 接。
  # 資料夾結構:/opt/data/<workspace_id>/{.env,config.yaml,state.db,skills/}
  hermes:
    image: autotest-hermes:0.13.0
    build:
      context: ./hermes
      dockerfile: Dockerfile
    container_name: autotest-hermes
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      TZ: Asia/Taipei
      HERMES_DATA_ROOT: /opt/data
      # Backend ↔ sidecar 共享 secret(必填,bootstrap 自動產一份);
      # 後續 PR 會在所有非 /healthz 路由驗 X-Sidecar-Auth header。
      SIDECAR_AUTH_TOKEN: ${SIDECAR_AUTH_TOKEN:?SIDECAR_AUTH_TOKEN is required - run docker compose --profile init run --rm bootstrap}
      # ACP 子進程池上限(per-user 一個進程,空閒 GC),保護記憶體
      HERMES_MAX_WORKERS: ${HERMES_MAX_WORKERS:-30}
      HERMES_IDLE_TTL_SEC: ${HERMES_IDLE_TTL_SEC:-900}
      # Hermes tools 若需要回打業務 API(例:從對話觸發跑回歸),走這條
      BACKEND_INTERNAL_URL: http://backend:8000
      # 不讓 Hermes 自己抓 Chromium — 既有 autotest-mcp / recorder 已有 Playwright,
      # Hermes 要瀏覽器工具時走 ACP tool 打回 backend MCP container(避免三份 Chromium)
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
    volumes:
      - hermes_data:/opt/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:7800/healthz"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 40s
    # 不對外 publish 7800;backend / celery 以 hermes:7800 內網解析。

  # ── mem0 sidecar ──────────────────────────────────────────────────────
  # mem0ai (https://github.com/mem0ai/mem0, Apache-2.0) — 跨 session 語意記憶層。
  # 跑獨立 sidecar(:7900,僅內網),內部用 mem0ai Python lib + per-request 動態
  # llm/embedder config(每個 user 用自己的 ai_token_configs default token)。
  # PR1 階段:proxy 只回 /healthz(同時驗 mem0-postgres reachable)。後續 PR 接
  # /v1/memory/{add,search,list,delete}。
  mem0:
    image: autotest-mem0:0.1.0
    build:
      context: ./mem0
      dockerfile: Dockerfile
    container_name: autotest-mem0
    restart: unless-stopped
    depends_on:
      mem0-postgres:
        condition: service_healthy
    environment:
      TZ: Asia/Taipei
      # Backend ↔ mem0 sidecar 共享 secret(bootstrap 自動產);所有非 /healthz
      # 路由都會驗 X-Sidecar-Auth header。與 hermes 的 SIDECAR_AUTH_TOKEN 不同
      # 一份 — 兩個 sidecar 各自獨立 secret 邊界。
      MEM0_SIDECAR_AUTH_TOKEN: ${MEM0_SIDECAR_AUTH_TOKEN:?MEM0_SIDECAR_AUTH_TOKEN is required - run docker compose --profile init run --rm bootstrap}
      MEM0_PG_HOST: mem0-postgres
      MEM0_PG_USER: mem0
      MEM0_PG_DB: mem0
      MEM0_PG_PASSWORD: ${MEM0_PG_PASSWORD:?MEM0_PG_PASSWORD is required - run docker compose --profile init run --rm bootstrap}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:7900/healthz"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    # 不對外 publish 7900;backend / hermes 以 mem0:7900 內網解析。

  # ── mem0-postgres(獨立 pgvector container)─────────────────────────
  # 與既有 autotest-postgres 隔離 — mem0 schema lifecycle 由 mem0ai lib own,
  # 不混進 backend Alembic 管理的 main DB。獨立 volume 也讓備份計畫獨立。
  mem0-postgres:
    image: pgvector/pgvector:pg16
    container_name: autotest-mem0-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mem0
      POSTGRES_PASSWORD: ${MEM0_PG_PASSWORD:?MEM0_PG_PASSWORD is required - run docker compose --profile init run --rm bootstrap}
      POSTGRES_DB: mem0
      TZ: Asia/Taipei
      PGTZ: Asia/Taipei
    volumes:
      - mem0_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mem0 -d mem0"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    # 不對外 publish 5432;mem0 sidecar 是唯一 client。

  frontend:
    image: autotest-frontend:${AUTOTEST_TAG:-1.1.1}
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: autotest-frontend
    restart: unless-stopped
    depends_on:
      - apisix
    ports:
      # 0.0.0.0:80 — 對 LAN 開放(本機部署也能 http://localhost/)。
      # 公開 internet 部署請改回 127.0.0.1:80:80 並前面套 reverse proxy + TLS。
      - "80:80"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/index.html:/usr/share/nginx/html/index.html:ro
      - ./frontend/js:/usr/share/nginx/html/js:ro

  # ── Apache APISIX：API 閘道器（Apache 2.0；standalone YAML 模式，不需 etcd）──
  apisix:
    image: apache/apisix:3.11.0-debian
    container_name: autotest-apisix
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./apisix/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ./apisix/apisix.yaml:/usr/local/apisix/conf/apisix.yaml:ro
    healthcheck:
      # APISIX image does not include wget/curl; use bash's /dev/tcp.
      test: ["CMD-SHELL", "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/9080; printf \"GET /healthz HTTP/1.1\\r\\nHost: 127.0.0.1\\r\\nConnection: close\\r\\n\\r\\n\" >&3; grep -q ok <&3'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ── VictoriaLogs：日誌儲存與面板（Apache 2.0；自帶 vmui） ──
  victoria-logs:
    image: victoriametrics/victoria-logs:v1.50.0
    container_name: autotest-victoria-logs
    restart: unless-stopped
    command:
      - "-storageDataPath=/victoria-logs-data"
      - "-retentionPeriod=30d"
      - "-httpListenAddr=:9428"
    volumes:
      - victoria_logs_data:/victoria-logs-data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:9428/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Fluent Bit：日誌採集端（Apache 2.0；推 Docker 容器 log 給 VictoriaLogs） ──
  fluent-bit:
    image: fluent/fluent-bit:3.2
    container_name: autotest-fluent-bit
    restart: unless-stopped
    depends_on:
      victoria-logs:
        condition: service_healthy
    volumes:
      - ./fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
      # Lua filter:讀 docker config.v2.json 補 container_name 欄位
      - ./fluent-bit/enrich.lua:/fluent-bit/etc/enrich.lua:ro
      # 讀取 host 上 docker daemon 寫的容器 log（json-file driver）
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      # tail 的 position DB:重啟時從斷點繼續,不漏 log 也不重讀
      - fluent_bit_state:/fluent-bit/state

  # ── RFC-8 觀察性堆疊(預設啟動)─────────────────────────────────────
  # Prometheus 抓取 /metrics、Jaeger 接 OTLP trace。兩者只開在 Docker 內網,
  # host 對外仍只暴露 frontend 的 http://localhost/。
  # 全 Apache-2.0 — 刻意不用 Grafana(AGPL-3.0)/ Tempo(AGPL-3.0)避免商用授權風險;
  # 換成「Prometheus 內部 UI 看 metrics」+「Jaeger 內部 UI 看 trace」
  # +「VictoriaLogs 內部 vmui 看 log」。host 對外入口固定只保留 http://localhost/。
  # 不想跑這兩顆 → `docker compose up -d --scale prometheus=0 --scale jaeger=0`
  # 或在 override 檔把它們再拉回 profile。
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: autotest-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    container_name: autotest-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"     # 開 OTLP gRPC + HTTP receivers
      SPAN_STORAGE_TYPE: memory

  # ── Spawn-time images(profile=spawnable:刻意永不啟動) ─────────────
  # 這 4 個 image 是 backend 在 runtime 動態 docker run 出來的(per-session
  # 容器,做測試執行 / 錄製 / MCP 操作),不是常駐 service。但 image 必須
  # 預先 build 好否則 spawn 時 image not found。把它們列在這裡有兩個好處:
  #   1. `docker compose --profile spawnable build` 一次 build 完
  #   2. 集中管理 image tag,跟 backend env 的 RECORDER_IMAGE / MCP_IMAGE 對齊
  # profile=spawnable 確保它們不會被 `docker compose up` 起來。
  robot-runner:
    build:
      context: ./backend
      dockerfile: Dockerfile.runner
    image: autotest-robot-runner:1.1.1
    profiles: ["spawnable"]
    command: ["true"]   # never started; defensive no-op if profile is misused
    restart: "no"

  recorder:
    build:
      context: ./backend
      dockerfile: Dockerfile.recorder
    image: autotest-recorder:1.1.1
    profiles: ["spawnable"]
    command: ["true"]
    restart: "no"

  recorder-api:
    build:
      context: ./backend
      dockerfile: Dockerfile.recorder-api
    image: autotest-recorder-api:1.1.1
    profiles: ["spawnable"]
    command: ["true"]
    restart: "no"

  mcp:
    build:
      context: ./backend
      dockerfile: Dockerfile.mcp
    image: autotest-mcp:1.1.1
    profiles: ["spawnable"]
    command: ["true"]
    restart: "no"

  # ── Bootstrap secrets(profile=init:首次部署用,跑完即丟) ──────────
  # 自動產生 .env 隨機 secret。第一次部署用一次,之後 .env 已存在會跳過。
  # 用法:
  #   docker compose --profile init run --rm bootstrap
  # 行為:
  #   * 若 .env 已存在 → 不覆寫,印 INFO 後 exit 0
  #   * 若 .env 不存在 → 用 openssl 產隨機 secrets 寫入,印 OK 後 exit 0
  bootstrap:
    image: alpine:3.20
    profiles: ["init"]
    working_dir: /work
    volumes:
      - .:/work
    entrypoint:
      - sh
      - -c
      - |
        set -e
        apk add --no-cache openssl coreutils >/dev/null
        if [ -f /work/.env ]; then
          echo "[INFO] .env already exists — skipping (delete it first to regenerate)"
          exit 0
        fi
        DB_PWD=$$(openssl rand -hex 24)
        S3_PWD=$$(openssl rand -hex 24)
        JWT=$$(openssl rand -hex 32)
        # Fernet key = urlsafe-b64(32 raw bytes), 44 chars with `=` padding.
        FERNET=$$(openssl rand 32 | base64 -w 0 | tr '+/' '-_')
        # Hermes sidecar ↔ backend 共享 secret(內網 RPC 驗證用)。
        SIDECAR=$$(openssl rand -hex 32)
        # mem0 sidecar ↔ backend 獨立的 secret(與 hermes 邊界分開)。
        MEM0_SIDECAR=$$(openssl rand -hex 32)
        # mem0-postgres 獨立 DB password(只 mem0 sidecar 知道)。
        MEM0_PG=$$(openssl rand -hex 24)
        cat > /work/.env <<EOF
        # AutoTest deployment secrets (auto-generated by bootstrap service).
        # Do not commit. Rotate periodically.
        DB_USER=admin
        DB_PASSWORD=$$DB_PWD
        DB_NAME=autotest_db
        BASE_URL=http://localhost
        ALLOWED_ORIGINS=http://localhost
        STORAGE_BACKEND=s3
        S3_ROOT_USER=admin
        S3_ROOT_PASSWORD=$$S3_PWD
        AUTOTEST_JWT_SECRET=$$JWT
        AUTOTEST_FERNET_KEY=$$FERNET
        SIDECAR_AUTH_TOKEN=$$SIDECAR
        MEM0_SIDECAR_AUTH_TOKEN=$$MEM0_SIDECAR
        MEM0_PG_PASSWORD=$$MEM0_PG
        EOF
        echo "[OK] .env created with random secrets"
    restart: "no"

volumes:
  postgres_data:
  seaweedfs_data:
  victoria_logs_data:
  prometheus_data:
  fluent_bit_state:
  hermes_data:
  mem0_pg_data:

# SeaweedFS S3 IAM 設定:從 .env 注入,docker compose 會在啟動時做變數替換。
# 修改後須 docker compose down -v 並 up 才能重新生效(SeaweedFS 啟動時讀一次)。
configs:
  seaweedfs_s3_config:
    content: |
      {
        "identities": [
          {
            "name": "${S3_ROOT_USER:-admin}",
            "credentials": [
              {
                "accessKey": "${S3_ROOT_USER:-admin}",
                "secretKey": "${S3_ROOT_PASSWORD:?S3_ROOT_PASSWORD is required - run docker compose --profile init run --rm bootstrap}"
              }
            ],
            "actions": ["Admin", "Read", "Write", "List", "Tagging"]
          },
          {
            "name": "anonymous",
            "actions": ["Read"]
          }
        ]
      }

networks:
  default:
    # 固定 network 名稱；spawn 容器要附加到這個 network 才能解析
    # postgres / valkey / seaweedfs 服務名
    name: autotest_default
