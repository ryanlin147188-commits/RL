services:
  # ── PostgreSQL：原 MySQL，改為 PostgreSQL（PostgreSQL License，類 MIT）─────────
  postgres:
    image: postgres:16-alpine
    container_name: autotest-postgres
    restart: unless-stopped
    environment:
      # 預設帳密 admin / admin123（首次啟動建立 user + database）
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required - run ./deploy.sh first to generate one}
      POSTGRES_DB: ${DB_NAME:-autotest_db}
      TZ: Asia/Taipei
      PGTZ: Asia/Taipei
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # 註：不掛 init_schema.sql；表結構由 backend lifespan 的 init_db() →
      # SQLAlchemy create_all() 依 app/models 自動建立（型別 / 欄位永遠與程式同步）。
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d ${DB_NAME:-autotest_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Valkey：原 Redis，改為 Valkey（BSD-3，Redis fork by Linux Foundation）──────
  valkey:
    image: valkey/valkey:8-alpine
    container_name: autotest-valkey
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── SeaweedFS：原 MinIO，改為 SeaweedFS（Apache 2.0）──────────────────────────
  # 使用 all-in-one 模式（master + volume + filer + s3 一起啟動）
  # S3 API port: 8333；Master HTTP（healthcheck）: 9333；不對外暴露 master/volume
  seaweedfs:
    image: chrislusf/seaweedfs:3.80
    container_name: autotest-seaweedfs
    restart: unless-stopped
    command: >
      server
      -dir=/data
      -s3
      -s3.config=/etc/seaweedfs/s3-config.json
      -master.volumePreallocate=false
      -metricsPort=9091
    volumes:
      - seaweedfs_data:/data
    configs:
      - source: seaweedfs_s3_config
        target: /etc/seaweedfs/s3-config.json
    ports:
      - "8333:8333"   # S3 API
      - "9333:9333"   # Master / dashboard
    healthcheck:
      # SeaweedFS master 9333 binds IPv4-only；用 127.0.0.1 避免 localhost → IPv6 解析失敗
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:9333/cluster/status | grep -q IsLeader || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # 一次性 bucket 建立（使用 aws-cli image 直接打 SeaweedFS S3 API）
  seaweedfs-init:
    image: amazon/aws-cli:2.18.5
    container_name: autotest-seaweedfs-init
    depends_on:
      seaweedfs:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-admin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required - run ./deploy.sh first to generate one}
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: >
      /bin/sh -c "
      aws --endpoint-url http://seaweedfs:8333 s3 mb s3://pic 2>/dev/null || true;
      aws --endpoint-url http://seaweedfs:8333 s3 mb s3://results 2>/dev/null || true;
      echo 'SeaweedFS buckets ready: pic, results';
      "
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: autotest-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      TZ: Asia/Taipei
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-admin}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required - run ./deploy.sh first to generate one}
      DB_NAME: ${DB_NAME:-autotest_db}
      REDIS_URL: redis://valkey:6379/0
      PIC_FOLDER: /app/PIC
      BASE_URL: ${BASE_URL:-http://localhost}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-minio}
      # MINIO_* 環境變數沿用作為「S3 端點」設定（內容指向 SeaweedFS）
      MINIO_ENDPOINT: http://seaweedfs:8333
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required - run ./deploy.sh first to generate one}
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DEBUG: "False"
      # CORS 白名單(逗號分隔);公開部署請改為實際前端 origin。
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
      # 應用層 secret(必填):JWT 簽章 + Fernet 對稱加密金鑰
      AUTOTEST_JWT_SECRET: ${AUTOTEST_JWT_SECRET:?AUTOTEST_JWT_SECRET is required - run ./deploy.sh first to generate one}
      AUTOTEST_FERNET_KEY: ${AUTOTEST_FERNET_KEY:?AUTOTEST_FERNET_KEY is required - run ./deploy.sh first to generate one}
      # ── Docker 模式錄製(Phase 1) ──
      RECORDER_IMAGE: ${RECORDER_IMAGE:-autotest-recorder:1.0.0}
      RECORDER_NETWORK: ${RECORDER_NETWORK:-autotest_default}
      RECORDER_INTERNAL_BASE_URL: http://backend:8000
      RECORDER_IDLE_TIMEOUT_MIN: 30
    volumes:
      # 截圖 / 影片 / Trace / 附件全部存 SeaweedFS,backend 不再需要 PIC volume
      # 掛入 docker socket,讓 /api/system/status 查 Docker 狀態 + recorder 容器啟停
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:8000"
      # 動態錄製容器會 publish 到 host 的 6080-6200 區段 port,不用在 backend 區塊另外 expose

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile.celery
    container_name: autotest-celery
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      TZ: Asia/Taipei
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-admin}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required - run ./deploy.sh first to generate one}
      DB_NAME: ${DB_NAME:-autotest_db}
      REDIS_URL: redis://valkey:6379/0
      PIC_FOLDER: /app/PIC
      BASE_URL: ${BASE_URL:-http://localhost}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-minio}
      MINIO_ENDPOINT: http://seaweedfs:8333
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required - run ./deploy.sh first to generate one}
      PLAYWRIGHT_HEADLESS: ${PLAYWRIGHT_HEADLESS:-1}
      # Celery worker 也會 import app.* 模組,需要相同的 secret(必填)
      AUTOTEST_JWT_SECRET: ${AUTOTEST_JWT_SECRET:?AUTOTEST_JWT_SECRET is required - run ./deploy.sh first to generate one}
      AUTOTEST_FERNET_KEY: ${AUTOTEST_FERNET_KEY:?AUTOTEST_FERNET_KEY is required - run ./deploy.sh first to generate one}
      ROBOT_RUNNER_IMAGE: ${ROBOT_RUNNER_IMAGE:-autotest-robot-runner:1.0.0}
      # 與下方 networks.default.name 保持一致
      ROBOT_RUNNER_NETWORK: ${ROBOT_RUNNER_NETWORK:-autotest_default}
    volumes:
      # Celery worker 透過 storage_service 直接寫 SeaweedFS,不需 PIC volume
      # 把 host 的 docker daemon 開放給 celery worker 用（spawn 子容器時呼叫）
      - /var/run/docker.sock:/var/run/docker.sock

  frontend:
    image: nginx:1.27-alpine
    container_name: autotest-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/index.html:/usr/share/nginx/html/index.html:ro

  # ── Apache APISIX：API 閘道器（Apache 2.0；standalone YAML 模式，不需 etcd）──
  apisix:
    image: apache/apisix:3.11.0-debian
    container_name: autotest-apisix
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./apisix/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ./apisix/apisix.yaml:/usr/local/apisix/conf/apisix.yaml:ro
    ports:
      - "9080:9080"   # gateway 對外 port
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:9080/healthz | grep -q ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ── VictoriaLogs：日誌儲存與面板（Apache 2.0；自帶 vmui） ──
  victoria-logs:
    image: victoriametrics/victoria-logs:v1.50.0
    container_name: autotest-victoria-logs
    restart: unless-stopped
    command:
      - "-storageDataPath=/victoria-logs-data"
      - "-retentionPeriod=30d"
      - "-httpListenAddr=:9428"
    volumes:
      - victoria_logs_data:/victoria-logs-data
    ports:
      - "9428:9428"   # HTTP API + vmui 面板（http://localhost:9428/select/vmui/）
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:9428/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Fluent Bit：日誌採集端（Apache 2.0；推 Docker 容器 log 給 VictoriaLogs） ──
  fluent-bit:
    image: fluent/fluent-bit:3.2
    container_name: autotest-fluent-bit
    restart: unless-stopped
    depends_on:
      victoria-logs:
        condition: service_healthy
    volumes:
      - ./fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
      # 讀取 host 上 docker daemon 寫的容器 log（json-file driver）
      - /var/lib/docker/containers:/var/lib/docker/containers:ro

  # ── RFC-8 觀察性堆疊（profile=obs：預設不啟動,docker compose --profile obs up）──
  # Prometheus 抓取 /metrics、Grafana 提供 dashboard、Tempo 接 OTLP traces。
  # 不放主路徑是為了:① 默認部署不額外吃資源 ② 讓客戶按需開啟。
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: autotest-prometheus
    restart: unless-stopped
    profiles: ["obs"]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.3.0
    container_name: autotest-grafana
    restart: unless-stopped
    profiles: ["obs"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_INSTALL_PLUGINS: ""
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  tempo:
    image: grafana/tempo:2.6.1
    container_name: autotest-tempo
    restart: unless-stopped
    profiles: ["obs"]
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./deploy/tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "4317:4317"   # OTLP gRPC -- backends export here via OTLP_ENDPOINT
      - "3200:3200"   # Tempo HTTP API for Grafana datasource

volumes:
  postgres_data:
  seaweedfs_data:
  victoria_logs_data:
  prometheus_data:
  grafana_data:
  tempo_data:

# SeaweedFS S3 IAM 設定:從 .env 注入,docker compose 會在啟動時做變數替換。
# 修改後須 docker compose down -v 並 up 才能重新生效(SeaweedFS 啟動時讀一次)。
configs:
  seaweedfs_s3_config:
    content: |
      {
        "identities": [
          {
            "name": "${MINIO_ROOT_USER:-admin}",
            "credentials": [
              {
                "accessKey": "${MINIO_ROOT_USER:-admin}",
                "secretKey": "${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required - run ./deploy.sh first to generate one}"
              }
            ],
            "actions": ["Admin", "Read", "Write", "List", "Tagging"]
          },
          {
            "name": "anonymous",
            "actions": ["Read"]
          }
        ]
      }

networks:
  default:
    # 固定 network 名稱；spawn 容器要附加到這個 network 才能解析
    # postgres / valkey / seaweedfs 服務名
    name: autotest_default
