# Prometheus scrape config for AutoTest v1.1 (RFC-8).
# Scrapes the backend /metrics + APISIX /apisix/prometheus/metrics.
# Add Postgres / Valkey exporters by deploying their containers and
# extending this file (kept minimal here so the obs profile boots clean).

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: autotest

scrape_configs:
  - job_name: backend
    metrics_path: /metrics
    static_configs:
      - targets: [backend:8000]

  - job_name: apisix
    metrics_path: /apisix/prometheus/metrics
    static_configs:
      - targets: [apisix:9091]

  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]
