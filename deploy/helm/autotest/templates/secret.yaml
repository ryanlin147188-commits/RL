{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "autotest.fullname" . }}-secrets
  labels:
    {{- include "autotest.labels" . | nindent 4 }}
type: Opaque
stringData:
  AUTOTEST_JWT_SECRET: {{ required "secrets.jwtSecret is required (or set secrets.existingSecret)" .Values.secrets.jwtSecret | quote }}
  AUTOTEST_FERNET_KEY: {{ required "secrets.fernetKey is required (or set secrets.existingSecret)" .Values.secrets.fernetKey | quote }}
  DB_PASSWORD: {{ required "postgres.password is required" .Values.postgres.password | quote }}
  MINIO_ROOT_PASSWORD: {{ required "secrets.minioRootPassword is required" .Values.secrets.minioRootPassword | quote }}
{{- end }}
