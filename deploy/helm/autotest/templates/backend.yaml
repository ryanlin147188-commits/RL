apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "autotest.fullname" . }}-backend
  labels:
    {{- include "autotest.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "autotest.name" . }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "autotest.name" . }}
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: {{ include "autotest.image" (dict "Chart" .Chart "Values" .Values "component" "autotest-backend") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: DB_HOST
              value: {{ if .Values.postgres.external }}{{ .Values.postgres.host }}{{ else }}{{ include "autotest.fullname" . }}-postgres{{ end }}
            - name: DB_PORT
              value: {{ .Values.postgres.port | quote }}
            - name: DB_USER
              value: {{ .Values.postgres.user }}
            - name: DB_NAME
              value: {{ .Values.postgres.database }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "autotest.secretName" . }}
                  key: DB_PASSWORD
            - name: AUTOTEST_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "autotest.secretName" . }}
                  key: AUTOTEST_JWT_SECRET
            - name: AUTOTEST_FERNET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "autotest.secretName" . }}
                  key: AUTOTEST_FERNET_KEY
            - name: REDIS_URL
              value: {{ if .Values.valkey.external }}redis://{{ .Values.valkey.host }}:{{ .Values.valkey.port }}/0{{ else }}redis://{{ include "autotest.fullname" . }}-valkey:6379/0{{ end }}
            {{- if .Values.observability.otlp.enabled }}
            - name: OTLP_ENDPOINT
              value: {{ .Values.observability.otlp.endpoint | quote }}
            {{- end }}
            {{- if .Values.observability.sentry.dsn }}
            - name: SENTRY_DSN
              value: {{ .Values.observability.sentry.dsn | quote }}
            {{- end }}
            {{- range $k, $v := .Values.backend.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "autotest.fullname" . }}-backend
  labels:
    {{- include "autotest.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  selector:
    app.kubernetes.io/name: {{ include "autotest.name" . }}
    app.kubernetes.io/component: backend
  ports:
    - port: 8000
      targetPort: http
      name: http
{{- if .Values.backend.podDisruptionBudget.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "autotest.fullname" . }}-backend
spec:
  minAvailable: {{ .Values.backend.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "autotest.name" . }}
      app.kubernetes.io/component: backend
{{- end }}
