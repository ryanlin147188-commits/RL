# AutoTest 開源 image bundle 部署用 compose
#
# 適用場景:你下載了一份 autotest-images-1.0.0.tar(從 GitHub Releases 或維運給的離線
# 包),用 `docker load -i autotest-images-1.0.0.tar` 載入後,執行:
#     docker compose -f docker-compose.bundle.yml up -d
# 即可。
#
# 跟根目錄的 docker-compose.yml 差別:
#   - 不再 build:從本機 image 拉(`image:` 而非 `build:`)
#   - frontend 用 pre-built image(不掛 index.html volume,變更前端要重建 image)
#   - 其他 service(postgres / valkey / seaweedfs / apisix / fluent-bit / victoria-logs)
#     完全跟原 dev compose 一致
#
# 必填 secret:DB_PASSWORD、S3_ROOT_PASSWORD、AUTOTEST_JWT_SECRET、
# AUTOTEST_FERNET_KEY。可先跑根目錄 `docker compose --profile init run --rm bootstrap` 產生 .env。

services:
  postgres:
    image: postgres:16-alpine
    container_name: autotest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required - run docker compose --profile init run --rm bootstrap}
      POSTGRES_DB: ${DB_NAME:-autotest_db}
      TZ: Asia/Taipei
      PGTZ: Asia/Taipei
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d ${DB_NAME:-autotest_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  valkey:
    image: valkey/valkey:8-alpine
    container_name: autotest-valkey
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  seaweedfs:
    image: chrislusf/seaweedfs:3.80
    container_name: autotest-seaweedfs
    restart: unless-stopped
    command: >
      server
      -dir=/data
      -s3
      -s3.config=/etc/seaweedfs/s3-config.json
      -master.volumePreallocate=false
      -metricsPort=9091
    volumes:
      - seaweedfs_data:/data
    configs:
      - source: seaweedfs_s3_config
        target: /etc/seaweedfs/s3-config.json
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:9333/cluster/status | grep -q IsLeader || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  seaweedfs-init:
    image: amazon/aws-cli:2.18.5
    container_name: autotest-seaweedfs-init
    depends_on:
      seaweedfs:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: ${S3_ROOT_USER:-admin}
      AWS_SECRET_ACCESS_KEY: ${S3_ROOT_PASSWORD:?S3_ROOT_PASSWORD is required - run docker compose --profile init run --rm bootstrap}
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: >
      /bin/sh -c "
      aws --endpoint-url http://seaweedfs:8333 s3 mb s3://pic 2>/dev/null || true;
      aws --endpoint-url http://seaweedfs:8333 s3 mb s3://results 2>/dev/null || true;
      echo 'SeaweedFS buckets ready: pic, results';
      "
    restart: "no"

  docker-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    container_name: autotest-docker-proxy
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      BUILD: 1
      POST: 1
      PING: 1
      INFO: 1
      VERSION: 1
      SYSTEM: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  # ── 開源 image(從 docker load 載進來)──
  backend:
    image: autotest-backend:${AUTOTEST_TAG:-1.0.0}
    container_name: autotest-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      docker-proxy:
        condition: service_started
    environment:
      TZ: Asia/Taipei
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-admin}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required - run docker compose --profile init run --rm bootstrap}
      DB_NAME: ${DB_NAME:-autotest_db}
      REDIS_URL: redis://valkey:6379/0
      PIC_FOLDER: /app/PIC
      BASE_URL: ${BASE_URL:-http://localhost}
      STORAGE_BACKEND: ${STORAGE_BACKEND:?STORAGE_BACKEND is required and must be 's3' (SeaweedFS via S3-compatible API; set STORAGE_BACKEND=s3 in .env)}
      S3_ENDPOINT: http://seaweedfs:8333
      S3_ACCESS_KEY: ${S3_ROOT_USER:-admin}
      S3_SECRET_KEY: ${S3_ROOT_PASSWORD:?S3_ROOT_PASSWORD is required - run docker compose --profile init run --rm bootstrap}
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DEBUG: "False"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
      AUTOTEST_JWT_SECRET: ${AUTOTEST_JWT_SECRET:?AUTOTEST_JWT_SECRET is required - run docker compose --profile init run --rm bootstrap}
      AUTOTEST_FERNET_KEY: ${AUTOTEST_FERNET_KEY:?AUTOTEST_FERNET_KEY is required - run docker compose --profile init run --rm bootstrap}
      DOCKER_HOST: tcp://docker-proxy:2375
    ports:
      - "8000:8000"

  celery:
    image: autotest-celery:${AUTOTEST_TAG:-1.0.0}
    container_name: autotest-celery
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      docker-proxy:
        condition: service_started
    environment:
      TZ: Asia/Taipei
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-admin}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required - run docker compose --profile init run --rm bootstrap}
      DB_NAME: ${DB_NAME:-autotest_db}
      REDIS_URL: redis://valkey:6379/0
      PIC_FOLDER: /app/PIC
      BASE_URL: ${BASE_URL:-http://localhost}
      STORAGE_BACKEND: ${STORAGE_BACKEND:?STORAGE_BACKEND is required and must be 's3' (SeaweedFS via S3-compatible API; set STORAGE_BACKEND=s3 in .env)}
      S3_ENDPOINT: http://seaweedfs:8333
      S3_ACCESS_KEY: ${S3_ROOT_USER:-admin}
      S3_SECRET_KEY: ${S3_ROOT_PASSWORD:?S3_ROOT_PASSWORD is required - run docker compose --profile init run --rm bootstrap}
      PLAYWRIGHT_HEADLESS: ${PLAYWRIGHT_HEADLESS:-1}
      AUTOTEST_JWT_SECRET: ${AUTOTEST_JWT_SECRET:?AUTOTEST_JWT_SECRET is required - run docker compose --profile init run --rm bootstrap}
      AUTOTEST_FERNET_KEY: ${AUTOTEST_FERNET_KEY:?AUTOTEST_FERNET_KEY is required - run docker compose --profile init run --rm bootstrap}
      # Spawn 出來的 runner image 也要對齊 tag
      ROBOT_RUNNER_IMAGE: autotest-runner:${AUTOTEST_TAG:-1.0.0}
      ROBOT_RUNNER_NETWORK: ${ROBOT_RUNNER_NETWORK:-autotest_default}
      DOCKER_HOST: tcp://docker-proxy:2375

  frontend:
    image: autotest-frontend:${AUTOTEST_TAG:-1.0.0}
    container_name: autotest-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

  apisix:
    image: apache/apisix:3.11.0-debian
    container_name: autotest-apisix
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./apisix/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ./apisix/apisix.yaml:/usr/local/apisix/conf/apisix.yaml:ro
    ports:
      - "9080:9080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:9080/healthz | grep -q ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  victoria-logs:
    image: victoriametrics/victoria-logs:v1.50.0
    container_name: autotest-victoria-logs
    restart: unless-stopped
    command:
      - "-storageDataPath=/victoria-logs-data"
      - "-retentionPeriod=30d"
      - "-httpListenAddr=:9428"
    volumes:
      - victoria_logs_data:/victoria-logs-data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:9428/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  fluent-bit:
    image: fluent/fluent-bit:3.2
    container_name: autotest-fluent-bit
    restart: unless-stopped
    depends_on:
      victoria-logs:
        condition: service_healthy
    volumes:
      - ./fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro

volumes:
  postgres_data:
  seaweedfs_data:
  victoria_logs_data:

configs:
  seaweedfs_s3_config:
    content: |
      {
        "identities": [
          {
            "name": "admin",
            "credentials": [
              { "accessKey": "${S3_ROOT_USER:-admin}", "secretKey": "${S3_ROOT_PASSWORD:?S3_ROOT_PASSWORD is required - run docker compose --profile init run --rm bootstrap}" }
            ],
            "actions": ["Admin", "Read", "Write", "List", "Tagging"]
          },
          { "name": "anonymous", "actions": ["Read"] }
        ]
      }

networks:
  default:
    name: autotest_default
