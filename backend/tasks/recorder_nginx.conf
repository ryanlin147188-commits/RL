# nginx config for the autotest-recorder image.
# Sits in front of websockify on port 6080 (the published port). Serves
# the static noVNC files directly so browsers can pipeline parallel JS
# module fetches without overwhelming websockify's single-threaded
# Python HTTP handler. Reverse-proxies the /websockify path to the
# websockify process bound to loopback:6081.

server {
    listen 6080 default_server;
    listen [::]:6080 default_server;

    server_name _;

    # noVNC static assets — vnc_lite.html, vnc.html, app/*, core/*, etc.
    root /usr/share/novnc;
    index vnc.html;

    # Disable gzip — noVNC's static files are mostly already small JS/CSS
    # and gzip on small files just adds latency.
    gzip off;

    # Allow the iframe to be embedded by the parent app (localhost:80).
    # We don't set X-Frame-Options at all; absence = allow all origins.
    # CORS not needed because nothing here is fetched cross-origin via XHR.

    # Force fresh fetches every time. Recording sessions are short-lived
    # (one container per session) and noVNC assets are tiny — the cost of
    # a few hundred KB of revalidation is far less than the cost of the
    # browser returning a cached failed response from a previous broken
    # session and never recovering. Critical when migrating users from
    # the old websockify-only image to this nginx-fronted version.
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    add_header Pragma "no-cache" always;

    # CORS / Private Network Access. The parent app at http://localhost
    # iframes the recorder on the same loopback but different port;
    # Chrome may classify that as a "private network request" and issue
    # an OPTIONS pre-flight. The headers are emitted on every response
    # via `always`, so the preflight gets them too — and the
    # OPTIONS-only return path below short-circuits to 204 before
    # nginx tries to dispatch it as a static file. (`add_header`
    # cannot live inside an `if`-block at server level — that's why
    # the headers and the redirect are split across the two blocks.)
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "*" always;
    add_header Access-Control-Allow-Private-Network "true" always;
    add_header Access-Control-Max-Age "600" always;

    # WebSocket upgrade: forward to websockify on loopback:6081
    location = /websockify {
        proxy_pass http://127.0.0.1:6081/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        # Big timeouts — VNC sessions are long-lived idle WebSocket.
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        # Disable buffering so VNC frames flush immediately.
        proxy_buffering off;
    }

    # Everything else is a static asset. try_files lets the browser
    # request `core/rfb.js` etc. and have nginx serve them straight off
    # disk in parallel.
    location / {
        # Short-circuit OPTIONS preflight — `if` is allowed inside
        # location for `return`, just not for add_header.
        if ($request_method = OPTIONS) {
            return 204;
        }
        try_files $uri $uri/ =404;
    }

    # Tiny static files don't need access logging — keep container
    # logs focused on entrypoint output.
    access_log off;
    error_log /tmp/nginx-error.log warn;
}
