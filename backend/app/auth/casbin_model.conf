## Casbin RBAC-with-domains model for the AutoTest platform.
##
## Plan reference: phases 2.1–2.4 of the Casdoor + Casbin migration.
##
## Subject / role semantics:
##   r.sub   = Casdoor username (matches Role.users entries and User.username)
##   r.dom   = "org:<org_id>"  for org-scoped grants
##             "project:<pid>" for project-scoped grants (3-level resolution
##             is flattened by app.auth.casbin_sync before being written here)
##             "global"        for org-less or platform-wide grants (admins)
##   r.obj   = "<resource>:<id>" or "<resource>:*" — see permissions_catalog
##   r.act   = action verb (read / write / delete / execute / approve / manage)
##
## keyMatch2 supports both ":id" path segments and "*" wildcards, so a single
## policy line p, alice, project:proj-123, project:*, read covers every
## project-scoped read inside that domain.

[request_definition]
r = sub, dom, obj, act

[policy_definition]
p = sub, dom, obj, act

[role_definition]
g = _, _, _

[policy_effect]
e = some(where (p.eft == allow))

[matchers]
m = g(r.sub, p.sub, r.dom) && keyMatch2(r.obj, p.obj) && keyMatch2(r.act, p.act)
