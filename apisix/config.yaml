# Apache APISIX main config (standalone mode -- no etcd).
# YAML is the sole source of routes / upstreams. See
# https://apisix.apache.org/docs/apisix/deployment-modes/

deployment:
  role: data_plane
  role_data_plane:
    config_provider: yaml

apisix:
  enable_admin: false              # standalone mode: admin API disabled
  enable_dev_mode: false
  node_listen: 9080                # internal gateway port (frontend nginx proxies here)
  # RFC-7: prometheus on a side port so /apisix/prometheus/metrics is not
  # accidentally reachable from outside the LAN.
  enable_control: true
  control:
    ip: "0.0.0.0"
    port: 9092

nginx_config:
  error_log_level: warn
  # Top-level upload cap; route-level body-size on /api/* tightens further.
  http:
    client_max_body_size: 50m

plugins:
  - prometheus
  - real-ip
  - response-rewrite
  - proxy-rewrite
  - request-id
  - limit-req
  - limit-count
  - cors
  - api-breaker          # RFC-7: circuit breaker so backend outages return
                         #        503 fast instead of holding sockets open
  - client-control       # RFC-7: per-route max-body-size enforcement

# Surface APISIX prometheus metrics at /apisix/prometheus/metrics on
# the standard data-plane port (in addition to control port 9092).
plugin_attr:
  prometheus:
    export_uri: /apisix/prometheus/metrics
    metric_prefix: apisix_
