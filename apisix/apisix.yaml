# APISIX standalone routes for AutoTest v1.1.
# Edit this file -- APISIX picks changes up automatically (no restart).
# The trailing #END marker is required.
#
# RFC-7 hardening on /api/*:
#   * cors.allow_origins is pinned to http://localhost instead of "*"
#   * client-control caps body at 25 MB
#   * api-breaker trips on 5 consecutive 5xx and serves 503 for 30s
#   * limit-count keyed by client IP for cheap per-tenant fairness
#   * upstream retries: 1 attempt for idempotent verbs only (GET/HEAD)

upstreams:
  - id: backend_api
    type: roundrobin
    nodes:
      "backend:8000": 1
    timeout:
      connect: 10
      send: 30
      read: 60
    retries: 1
    retry_timeout: 30

  - id: frontend_web
    type: roundrobin
    nodes:
      "frontend:80": 1

  - id: apisix_control
    type: roundrobin
    nodes:
      "127.0.0.1:9092": 1

routes:
  # Public OpenAPI JSON through the gateway. Backend exposes the schema at
  # /openapi.json, while docs link to /api/openapi.json for external access.
  - id: openapi_json
    uri: /api/openapi.json
    upstream_id: backend_api
    plugins:
      proxy-rewrite:
        uri: /openapi.json
      cors:
        allow_origins: "http://localhost"
        allow_methods: "GET,HEAD,OPTIONS"
        allow_headers: "**"
        allow_credential: true

  # /api/* -> FastAPI backend
  - id: api_routes
    uri: /api/*
    upstream_id: backend_api
    plugins:
      request-id:
        include_in_response: true
      cors:
        # Keep this as a concrete comma-separated list. APISIX standalone
        # validates this YAML directly and does not expand shell-style
        # ${VAR:-default} placeholders.
        # NOTE: APISIX cors plugin refuses '*' when allow_credential=true;
        # use the literal '**' which means "wildcard with credentials,
        # caller is aware of the implications".
        allow_origins: "http://localhost"
        allow_methods: "GET,POST,PUT,PATCH,DELETE,HEAD,OPTIONS"
        allow_headers: "**"
        allow_credential: true
        max_age: 3600
      client-control:
        # Reject payloads >25 MB at the gateway. File uploads route through
        # /api/upload only; tighten there if needed.
        max_body_size: 26214400
      limit-req:
        rate: 200
        burst: 100
        rejected_code: 429
        key: remote_addr
      limit-count:
        # Per-IP request budget over 60s. Cheap proxy for per-tenant
        # fairness until APISIX jwt-auth lands and we can key on org_id.
        count: 600
        time_window: 60
        rejected_code: 429
        key_type: var
        key: remote_addr
      api-breaker:
        break_response_code: 503
        break_response_body: '{"error":"upstream_unavailable"}'
        max_breaker_sec: 30
        unhealthy:
          http_statuses: [500, 502, 503, 504]
          failures: 5
        healthy:
          http_statuses: [200, 204, 301, 302]
          successes: 3

  # WebSocket /ws/* -> backend (no body limits, breaker still applies)
  - id: ws_routes
    uri: /ws/*
    upstream_id: backend_api
    enable_websocket: true
    plugins:
      request-id:
        include_in_response: true
      cors:
        allow_origins: "http://localhost"
        allow_methods: "GET,POST,HEAD,OPTIONS"
        allow_headers: "**"
        allow_credential: true

  # /pics/* + /results/* -> backend (artifact streams: screenshots / videos /
  # robot reports). Auth happens at backend; here we just want the same
  # request-id + breaker visibility as /api/*. Skip body cap (these are GET
  # downloads) and use a higher per-IP budget because a single report page
  # may pull dozens of artifacts in parallel.
  - id: artifact_routes
    uris:
      - /pics/*
      - /results/*
    upstream_id: backend_api
    plugins:
      request-id:
        include_in_response: true
      cors:
        # 開到 same-host 的 http / https 兩種(LAN 部署常見 IP / hostname):
        # Trace Viewer 走 HTTPS 後會從 https://<host>/trace-viewer/ fetch
        # https://<host>/results/<...>.zip;以前 allow_origins=http://localhost
        # 直接擋掉。token 走 query param 不靠 cookie 所以 credential 關掉即可
        # 用 ** wildcard。
        allow_origins: "**"
        allow_methods: "GET,HEAD,OPTIONS"
        allow_headers: "**"
        allow_credential: false
      limit-count:
        count: 1200
        time_window: 60
        rejected_code: 429
        key_type: var
        key: remote_addr
      api-breaker:
        break_response_code: 503
        break_response_body: '{"error":"upstream_unavailable"}'
        max_breaker_sec: 30
        unhealthy:
          http_statuses: [500, 502, 503, 504]
          failures: 5
        healthy:
          http_statuses: [200, 204, 206, 301, 302]
          successes: 3

  # Liveness: APISIX answers locally so a missing backend cannot break LB checks.
  - id: gateway_health
    uri: /healthz
    upstream_id: apisix_control
    plugins:
      proxy-rewrite:
        uri: /v1/healthcheck
      response-rewrite:
        status_code: 200
        body: "ok"

  # Readiness: defer to backend so we report the real dependency status.
  - id: gateway_ready
    uri: /readyz
    upstream_id: backend_api

  # Default static -> nginx frontend
  - id: web_routes
    uri: /*
    upstream_id: frontend_web

#END
