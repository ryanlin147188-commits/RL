## Casdoor server config (mounted at /conf/app.conf inside the container).
##
## See https://casdoor.org/docs/deployment/config-options for the full reference.
## Values referencing ${VAR} are substituted by docker compose at container-start
## time from the host .env file (bootstrap auto-generates the secrets).
##
## RL platform integration notes:
##   * runmode=dev keeps richer logging; flip to "prod" once the migration is done
##   * httpport=8000 — matches the internal port APISIX/nginx reverse proxies to
##   * driverName=postgres + dataSourceName points at the existing
##     autotest-postgres container; a separate DB ("casdoor") keeps Casdoor's
##     own schema lifecycle isolated from Alembic-managed app tables.
##   * authState / sessionConfig.Secret use AUTOTEST_JWT_SECRET so a single
##     compose `up` produces a fully sealed deployment without secret sprawl.

appname = casdoor
httpport = 8000
runmode = dev
copyrequestbody = true

driverName = postgres
# Casdoor's go-pg uses libpq-style connection string. host=postgres so it
# resolves against Docker's embedded DNS to the existing autotest-postgres
# container; sslmode=disable because we stay on the internal compose network.
dataSourceName = "user=${DB_USER} password=${DB_PASSWORD} host=postgres port=5432 sslmode=disable dbname=postgres"
dbName = casdoor

redisEndpoint = redis://valkey:6379/3

# RS256 signing material for the Casdoor application's OIDC tokens.
# Casdoor manages its own private key in DB after first boot; the JWT_SECRET
# below is only used for Casdoor's internal session cookie + REST API token.
sessionConfig = {"enableSidByHeader": true, "cookieLifeTime": 3600, "providerName": "memory", "providerConfig": "", "domain": "", "cookieName": "casdoor_session_id", "secure": false, "disableHTTPOnly": false}
authState = casdoor
verificationCodeTimeout = 10
initScore = 2000
logConfig = {"filename": "logs/casdoor.log", "maxdays":99999, "perm":"0770"}

# Token endpoints accept POST without trailing slash for IdP interop.
isUsernameLowered = false
inactiveTimeoutMinutes =

# Disable Casdoor's own /api/health pings to mem0/prom etc — we don't need them.
sociallessLogin = false
