# AutoTest Gateway routes configuration
#
# Commit 3 啟用:gateway 啟動時讀這份 yaml,動態套用「per-route 限速 + 熔斷
# 分組」。設定改完 docker compose restart gateway 重載(不需 rebuild image)。

version: 1
upstream:
  backend: http://backend:8000

# 預設限速(沒 match 到 per-route override 都吃這條)
# v1.1.10:user 反映 dev 期間容易撞 — 全面放寬到「能擋掉惡意爬蟲,但 dev 用
# 不到的等級」。改 routes.yaml 後 docker compose restart gateway 即可。
default_rate_limit: 2000/minute

routes:
  - match: { path: /api/auth/login, methods: [POST] }
    rate_limit: 100/minute      # 暴力破解保護,但 dev 反覆試密碼 OK
    circuit_group: auth
  # v1.1.10 自助註冊 + email verify(4 條)
  - match: { path: /api/auth/register, methods: [POST] }
    rate_limit: 10/hour         # 防爬蟲創帳號
    circuit_group: auth
  - match: { path: /api/auth/register/verify-check, methods: [GET] }
    rate_limit: 60/minute       # 前端載入會打,放寬
    circuit_group: auth
  - match: { path: /api/auth/register/verify, methods: [POST] }
    rate_limit: 20/hour         # 防暴力猜 token
    circuit_group: auth
  - match: { path: /api/auth/register/resend-verify, methods: [POST] }
    rate_limit: 3/hour          # 防被當寄信跳板
    circuit_group: auth
  - match: { path: /api/auth/forgot-password, methods: [POST] }
    rate_limit: 20/hour         # 同 IP 每小時 20 次寄信
    circuit_group: auth
  - match: { path: /api/auth/reset-password, methods: [POST] }
    rate_limit: 30/hour
    circuit_group: auth
  - match: { path: /api/auth/refresh, methods: [POST] }
    rate_limit: 300/minute      # SPA 自動 refresh 完全不卡
    circuit_group: auth
  - match: { path: /api/executions, methods: [POST] }
    rate_limit: 120/minute
    circuit_group: executions
  - match: { path: /api/, methods: [] }
    rate_limit: 2000/minute     # 一般 API 流量
    circuit_group: default

# 熔斷器 — 每個 group 一個獨立 breaker
# threshold:連續失敗(5xx 或 connect failure)幾次後 open
# ttl_seconds:open 多久後 half-open 試一次
circuit_breakers:
  auth:        { threshold: 5,  ttl_seconds: 30 }
  executions:  { threshold: 3,  ttl_seconds: 60 }
  default:     { threshold: 10, ttl_seconds: 30 }
