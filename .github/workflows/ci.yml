name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  # gitleaks-action 要 GET /repos/.../pulls/{n}/commits → 需要 pull-requests: read
  pull-requests: read

jobs:
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  python-deps-audit:
    name: Python dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit

      - name: Audit backend/requirements.txt
        # `--disable-pip` requires hashed requirements; backend/requirements.txt 沒
        # 鎖 hash,所以改用 `--no-deps`(只審 requirements.txt 直接列出的套件,
        # 不再 resolve 子依賴 — pin 過的 transitives 反正也會出現在這份清單上)。
        #
        # 已知接受項目(2026-05-07):各 CVE 的 fix version 都是 major bump,
        # 可能讓 fastapi 0.115 / starlette / 應用層相依破裂。後續會排一輪
        # deps 升級的 spike,屆時再把這些 ignore 拿掉。
        run: |
          pip-audit --requirement backend/requirements.txt --strict --no-deps \
            --ignore-vuln CVE-2026-28684 \
            --ignore-vuln CVE-2026-32597 \
            --ignore-vuln CVE-2024-12797 \
            --ignore-vuln CVE-2026-26007 \
            --ignore-vuln CVE-2026-34073 \
            --ignore-vuln CVE-2024-53981 \
            --ignore-vuln CVE-2026-24486 \
            --ignore-vuln CVE-2026-40347 \
            --ignore-vuln CVE-2026-42561 \
            --ignore-vuln CVE-2024-47874 \
            --ignore-vuln CVE-2025-54121

  python-static-analysis:
    name: Python static analysis (bandit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install bandit
        run: python -m pip install --upgrade pip "bandit[toml]"

      - name: Run bandit
        # 已知接受項目(2026-05-07):
        #   B104 — config.py 預設 APP_HOST=0.0.0.0(server bind 必要)
        #   B108 — recordings.py 寫 /tmp 是 Playwright trace 的固定行為
        #   B310 — recordings.py urlopen 有外層 allowlist + sanitize
        run: bandit -r backend/app -ll -ii --skip B104,B108,B310 --exclude backend/app/tests

  sync-async-boundary:
    name: DB-session boundary lints
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run boundary lint
        working-directory: backend
        run: python scripts/lint_sync_async_boundary.py

      - name: Run tenant select lint
        working-directory: backend
        run: python scripts/lint_tenant_scoped_selects.py

  alembic-round-trip:
    name: Alembic upgrade / downgrade round trip
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin123
          POSTGRES_DB: autotest_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_USER: admin
      DB_PASSWORD: admin123
      DB_NAME: autotest_db
      AUTOTEST_JWT_SECRET: ci-jwt-secret-not-real-not-real-not-real
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Upgrade head
        working-directory: backend
        run: alembic upgrade head

      - name: Downgrade base
        working-directory: backend
        run: alembic downgrade base

      - name: Upgrade head again
        working-directory: backend
        run: alembic upgrade head

  backend-tests:
    name: Backend pytest (unit + integration)
    runs-on: ubuntu-latest
    env:
      AUTOTEST_JWT_SECRET: ci-jwt-secret-not-real-not-real-not-real
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: Run unit tests
        working-directory: backend
        run: pytest tests/unit -v

      - name: Run integration tests (testcontainers Postgres)
        working-directory: backend
        run: pytest tests/integration -v --cov=app --cov-report=term-missing
