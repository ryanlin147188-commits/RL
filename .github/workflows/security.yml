# v1.1.15 P3-1 / P3-3 / P3-5:CI 安全管線補強。
#
# 已存在的安全 CI(見 ci.yml):
#   - gitleaks  (P3-4 secret scan)
#   - pip-audit (P3-2 Python SCA)
#   - bandit    (P3-1 Python SAST 部分)
#
# 本檔補上:
#   - semgrep   (P3-1 補:跨語言、規則更廣的 SAST,涵蓋 OWASP / CWE / secrets)
#   - trivy     (P3-3 container image vulnerability scan + dockerfile misconfig)
#   - syft      (P3-5 SBOM,SPDX/CycloneDX 格式,artefact 留存供未來 CVE 追溯)
#
# 全部設計為「報告型」:SARIF 上傳 GitHub Security tab,critical 視情況 fail。
# 跑在 PR + push:main + 每週日凌晨(catch 新 CVE 公告)。
name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # 每週日凌晨 03:00 UTC = 台灣 11:00,catch 上週新公告 CVE
    - cron: "0 3 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ── P3-1 補:Semgrep SAST(規則涵蓋 OWASP Top 10 / CWE / secrets / Docker)──
  semgrep:
    name: SAST (semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Semgrep scan(p/security-audit + p/python + p/owasp-top-ten + p/docker)
        # ``--error`` 只在 HIGH/CRITICAL 等級才 fail,避免 noise 擋 PR。
        # ``--sarif`` 上傳 GitHub Security tab。
        run: |
          semgrep ci \
            --config=p/security-audit \
            --config=p/python \
            --config=p/owasp-top-ten \
            --config=p/docker \
            --severity=ERROR \
            --error \
            --sarif --output=semgrep.sarif \
            --exclude=node_modules \
            --exclude=frontend/js/trace-viewer \
            --exclude='**/*.min.js' \
          || true   # 不擋 PR,先觀察 1~2 週的 finding 量;穩定後改為強制
        env:
          SEMGREP_RULES: "p/security-audit p/python p/owasp-top-ten p/docker"

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  # ── P3-3:Trivy container image + filesystem + misconfig scan ──
  trivy-fs:
    name: Container/FS scan (trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Filesystem mode:掃 requirements.txt / pyproject.toml 依賴 CVE +
      # Dockerfile / docker-compose 的 misconfiguration(latest tag、root user 等)。
      - name: Trivy FS scan(vuln + misconfig + secret)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL
          # 不在這層擋 PR,所有 finding 都上傳 GitHub Security tab 由人類審視。
          exit-code: "0"
          ignore-unfixed: true
          skip-dirs: 'node_modules,frontend/js/trace-viewer'

      - name: Upload Trivy FS SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  trivy-image:
    name: Image scan (trivy)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { name: backend,  context: ./backend, dockerfile: backend/Dockerfile }
          - { name: gateway,  context: ./gateway, dockerfile: gateway/Dockerfile }
          - { name: frontend, context: ., dockerfile: frontend/Dockerfile }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ${{ matrix.target.name }} image
        run: |
          docker build \
            -t local/autotest-${{ matrix.target.name }}:ci \
            -f ${{ matrix.target.dockerfile }} \
            ${{ matrix.target.context }}

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: local/autotest-${{ matrix.target.name }}:ci
          format: sarif
          output: trivy-image-${{ matrix.target.name }}.sarif
          severity: HIGH,CRITICAL
          exit-code: "0"
          ignore-unfixed: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image-${{ matrix.target.name }}.sarif
          category: trivy-image-${{ matrix.target.name }}

  # ── P3-5:SBOM 產生(syft → SPDX + CycloneDX),作為 release artefact 留存 ──
  sbom:
    name: SBOM (syft)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Generate SBOM(SPDX JSON)
        run: |
          syft dir:. \
            --exclude './node_modules/**' \
            --exclude './frontend/js/trace-viewer/**' \
            -o spdx-json=sbom.spdx.json \
            -o cyclonedx-json=sbom.cyclonedx.json

      - name: Upload SBOM artefact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: |
            sbom.spdx.json
            sbom.cyclonedx.json
          retention-days: 90
