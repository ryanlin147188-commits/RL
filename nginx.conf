server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ── Docker 內建 DNS（127.0.0.11）；搭配下方 proxy_pass 用變數的寫法，
    #     強迫 nginx 每次請求重新解析上游 IP，避免 backend 容器重建後 nginx
    #     仍指向舊 IP 造成 502 Bad Gateway。
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── SPA fallback ─────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── REST API 反代到 backend:8000 ─────────────────────
    location /api/ {
        set                $backend_upstream http://backend:8000;
        proxy_pass         $backend_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── 截圖靜態檔 ───────────────────────────────────────
    # local 模式 (STORAGE_BACKEND=local)：FastAPI mount /pics
    # minio 模式：建議改用 /pics/ → minio:9000/pic/ 反代（見下方 minio block）
    location /pics/ {
        set                $backend_upstream http://backend:8000;
        proxy_pass         $backend_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── MinIO 反代：報表 (results bucket) ────────────────
    # 包含 log.html / report.html / output.xml / step screenshots / trace.zip / videos
    # trace.playwright.dev 嵌入式 viewer 會跨網域 fetch trace.zip，必須開 CORS。
    location /results/ {
        proxy_pass         http://minio:9000/results/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_buffering    off;

        # MinIO 也會送自己的 CORS headers（會跟我們的衝突造成 duplicate ACAO 被瀏覽器拒絕）
        # 一律隱藏 upstream 的 Access-Control-* 與相關 header，由 nginx 端統一輸出
        proxy_hide_header  Access-Control-Allow-Origin;
        proxy_hide_header  Access-Control-Allow-Credentials;
        proxy_hide_header  Access-Control-Allow-Methods;
        proxy_hide_header  Access-Control-Allow-Headers;
        proxy_hide_header  Access-Control-Expose-Headers;
        proxy_hide_header  Access-Control-Max-Age;

        # CORS：允許 trace.playwright.dev 與本機網域跨來源讀檔
        add_header Access-Control-Allow-Origin  '*' always;
        add_header Access-Control-Allow-Methods 'GET, HEAD, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Range, If-Range, Content-Type' always;
        add_header Access-Control-Expose-Headers 'Content-Length, Content-Range, Accept-Ranges' always;
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  '*' always;
            add_header Access-Control-Allow-Methods 'GET, HEAD, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Range, If-Range, Content-Type' always;
            add_header Access-Control-Max-Age       1728000;
            return 204;
        }
    }

    # ── MinIO 反代：截圖 (pic bucket)，供 STORAGE_BACKEND=minio 使用 ──
    location /pic/ {
        proxy_pass         http://minio:9000/pic/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_buffering    off;
    }

    # ── WebSocket 升級反代 ───────────────────────────────
    location /ws/ {
        set                 $backend_upstream http://backend:8000;
        proxy_pass          $backend_upstream$request_uri;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host $host;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # ── gzip ─────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss text/javascript;
    gzip_min_length 1024;
}
